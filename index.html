  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';

    import { Pencil, Eraser, Send, Plus, FileText, AlertCircle, Clock, Trash2, Settings, DownloadCloud, Menu, X, Square, Circle, Triangle, Check, Image as ImageIcon, Video, Link as LinkIcon, Lightbulb, ExternalLink, Layers, Eye, EyeOff, Paperclip, Download, Lock, Key, RefreshCw, Clipboard, Sparkles, PaintBucket, ZoomIn, ZoomOut, Maximize2, RotateCcw, BookOpen, School, ChevronLeft, ChevronRight, Palette, Smile, Type, Bold, Italic, Underline, Strikethrough, Undo2, Cloud, Link, Unlink, Hand, Scissors, Pipette, ArrowUp, ArrowDown, Edit3 } from 'lucide-react';

    // 🌟 선생님의 파이어베이스 설정 🌟
    const firebaseConfig = {
      apiKey: "AIzaSyAY5jRQWWKgymfHMmZxR55k_Sy26NrV_yQ",
      authDomain: "smart-work-6baed.firebaseapp.com",
      projectId: "smart-work-6baed",
      storageBucket: "smart-work-6baed.firebasestorage.app",
      messagingSenderId: "952088924411",
      appId: "1:952088924411:web:32dcab321d7348b850e05e",

    const app = initializeApp(firebaseConfig);

    const appId = 'github-smart-worksheet-v10-final';

    const loadPdfJs = async () => {
      if (window.pdfjsLib) return window.pdfjsLib;
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        script.onload = () => {
          if(!window.pdfjsLib) reject("Failed to load PDF.js");
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          resolve(window.pdfjsLib);
        };
        script.onerror = reject;
        document.head.appendChild(script);
      });
    };

    // 사진 용량 초절약 압축 도우미 함수 (1200px 제한 & JPEG 변환)
    const compressImage = (dataUrl, callback) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width; let h = img.height;
        if(w > 1200) { h = Math.round(h * (1200/w)); w = 1200; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; // 투명 배경을 흰색으로 채워 용량 절감
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL('image/jpeg', 0.8));
      };
      img.src = dataUrl;
    };

    const DEFAULT_STUDENTS = [
      { id: 'student_1', name: '김민수' },
      { id: 'student_2', name: '이지은' },
      { id: 'student_3', name: '박지호' },
      { id: 'student_4', name: '최유리' },
      { id: 'student_5', name: '정우진' },
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);

      const [assignments, setAssignments] = useState([]);
      const [submissions, setSubmissions] = useState([]);
      const [credentials, setCredentials] = useState({}); 
      const [students, setStudents] = useState([]); // 초기값 빈 배열로 하여 로그인 시 기본 예시 이름 깜빡임 방지
      const [schoolInfo, setSchoolInfo] = useState({ schoolName: '행복', grade: '5', classNum: '1' });

      const [appAlert, setAppAlert] = useState({ show: false, title: '', message: '', onConfirm: null, isConfirm: false });
      const [passwordPrompt, setPasswordPrompt] = useState({ show: false, targetRole: null, passwordInput: '', error: '' });

      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (error) { console.error("Auth error:", error); }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          setIsInitializing(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const assignRef = collection(db, 'artifacts', appId, 'public', 'data', 'assignments');
        const subRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
        const credRef = collection(db, 'artifacts', appId, 'public', 'data', 'credentials');
        const rosterRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', 'roster');
        const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'schoolInfo');

        const unsubAssign = onSnapshot(assignRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setAssignments(data.sort((a, b) => b.createdAt - a.createdAt));
        }, (err) => console.error(err));

        const unsubSub = onSnapshot(subRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setSubmissions(data);
        }, (err) => console.error(err));

        const unsubCred = onSnapshot(credRef, (snapshot) => {
          const creds = {};
          snapshot.docs.forEach(doc => { creds[doc.id] = doc.data().password; });
          setCredentials(creds);
        }, (err) => console.error(err));

        const unsubRoster = onSnapshot(rosterRef, (docSnap) => {
          if (docSnap.exists() && docSnap.data().list) setStudents(docSnap.data().list);
          else setDoc(rosterRef, { list: [] });
        }, (err) => console.error(err));

        const unsubSettings = onSnapshot(settingsRef, (docSnap) => {
          if (docSnap.exists()) setSchoolInfo(docSnap.data());
        }, (err) => console.error(err));

        return () => { unsubAssign(); unsubSub(); unsubCred(); unsubRoster(); unsubSettings(); };
      }, [user]);

      const showAlert = (title, message) => setAppAlert({ show: true, title, message, onConfirm: null, isConfirm: false });
      const showConfirm = (title, message, onConfirm) => setAppAlert({ show: true, title, message, onConfirm, isConfirm: true });
      const handleAlertClose = () => setAppAlert({ show: false, title: '', message: '', onConfirm: null, isConfirm: false });
      const handleAlertConfirm = () => { if (appAlert.onConfirm) appAlert.onConfirm(); handleAlertClose(); };

      const handleLoginClick = (selectedRole) => setPasswordPrompt({ show: true, targetRole: selectedRole, passwordInput: '', error: '' });
      const handleLoginSubmit = (e) => {
        e.preventDefault();
        const roleId = passwordPrompt.targetRole === 'teacher' ? 'teacher' : passwordPrompt.targetRole.id;
        const savedPassword = credentials[roleId] || '0000'; 
        if (passwordPrompt.passwordInput === savedPassword) {
          setRole(passwordPrompt.targetRole);
          setPasswordPrompt({ show: false, targetRole: null, passwordInput: '', error: '' });
        } else {
          setPasswordPrompt(prev => ({ ...prev, error: '비밀번호가 올바르지 않습니다! 다시 입력해볼까요? 😢' }));
        }
      };

      if (isInitializing) return <div className="flex h-screen items-center justify-center text-xl font-bold text-indigo-400 bg-indigo-50">마법의 교실로 들어가는 중... ✨</div>;

      return (
        <>
          {appAlert.show && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
              <div className="bg-white rounded-[2rem] p-8 shadow-2xl max-w-sm w-full border-4 border-indigo-100 animate-fade-in text-center transform transition-all">
                <div className="mx-auto w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mb-4 text-indigo-500">
                  {appAlert.isConfirm ? <AlertCircle size={32} /> : <Smile size={32} />}
                </div>
                <h3 className="text-xl font-black text-slate-800 mb-2">{appAlert.title}</h3>
                <p className="text-slate-500 text-sm mb-8 whitespace-pre-wrap leading-relaxed">{appAlert.message}</p>
                <div className="flex gap-3 justify-center">
                  {appAlert.isConfirm && (
                    <button onClick={handleAlertClose} className="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl font-bold text-sm transition-all shadow-sm">아니요</button>
                  )}
                  <button onClick={handleAlertConfirm} className="px-8 py-3 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white rounded-2xl font-bold text-sm transition-all shadow-lg shadow-indigo-200 hover:-translate-y-1">예, 확인했어요!</button>
                </div>
              </div>
            </div>
          )}

          {!role ? (
            <div className="flex flex-col h-screen items-center justify-center bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 p-4 relative overflow-hidden">
              <div className="absolute top-10 left-10 w-32 h-32 bg-yellow-200 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob"></div>
              <div className="absolute top-20 right-20 w-40 h-40 bg-purple-200 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob animation-delay-2000"></div>
              <div className="absolute -bottom-8 left-1/2 w-48 h-48 bg-pink-200 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob animation-delay-4000"></div>

              {passwordPrompt.show && (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
                  <form onSubmit={handleLoginSubmit} className="bg-white rounded-[2rem] p-8 shadow-2xl max-w-sm w-full border-4 border-indigo-100 animate-fade-in space-y-5">
                    <div className="text-center">
                      <div className="w-16 h-16 bg-gradient-to-tr from-indigo-100 to-purple-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><Lock size={28} /></div>
                      <h3 className="text-xl font-black text-slate-800">{passwordPrompt.targetRole === 'teacher' ? '선생님 안녕하세요! 👩‍🏫' : `${passwordPrompt.targetRole.name} 학생 안녕! 🎒`}</h3>
                      <p className="text-xs text-slate-400 mt-2 font-medium">안전을 위해 우리만의 비밀번호를 입력해 주세요.</p>
                    </div>
                    <div>
                      <input type="password" value={passwordPrompt.passwordInput} onChange={(e) => setPasswordPrompt(prev => ({ ...prev, passwordInput: e.target.value, error: '' }))} placeholder="비밀번호 4자리" autoFocus className="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center font-black tracking-[0.5em] text-xl text-slate-700 focus:outline-none focus:border-indigo-400 focus:bg-white transition-all shadow-inner" />
                      {passwordPrompt.error && <p className="text-[11px] font-bold text-rose-500 mt-2 text-center animate-bounce">{passwordPrompt.error}</p>}
                    </div>
                    <div className="bg-amber-50 p-3 rounded-2xl border-2 border-amber-100 text-center"><span className="text-[11px] font-black text-amber-700">💡 초기 비밀번호는 <span className="text-rose-500 underline text-sm">0000</span> 입니다!</span></div>
                    <div className="flex gap-3 pt-2">
                      <button type="button" onClick={() => setPasswordPrompt({ show: false, targetRole: null, passwordInput: '', error: '' })} className="flex-1 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl font-bold text-sm transition-all">뒤로가기</button>
                      <button type="submit" className="flex-1 py-3.5 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white rounded-2xl font-black text-sm transition-all shadow-lg shadow-indigo-200 hover:-translate-y-1">교실 들어가기 🚀</button>
                    </div>
                  </form>
                </div>
              )}

              <div className="bg-white/80 backdrop-blur-xl p-8 md:p-12 rounded-[3rem] shadow-2xl text-center max-w-xl w-full border-4 border-white relative z-10">
                <div className="flex justify-center mb-6 text-indigo-500"><div className="bg-white p-4 rounded-3xl shadow-xl shadow-indigo-100 rotate-3 hover:rotate-6 transition-transform"><Palette size={56} strokeWidth={2.5}/></div></div>
                <h1 className="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-3 tracking-tight">스마트 드로잉 학습지 ✨</h1>
                <p className="text-slate-500 mb-10 font-bold bg-slate-100 inline-block px-4 py-1.5 rounded-full text-sm border border-slate-200">🏫 {schoolInfo.schoolName}학교 {schoolInfo.grade}학년 {schoolInfo.classNum}반</p>
                <div className="space-y-6">
                  <button onClick={() => handleLoginClick('teacher')} className="w-full py-4.5 bg-slate-800 text-white rounded-3xl font-black text-lg hover:bg-slate-900 transition-all flex items-center justify-center gap-2 shadow-xl shadow-slate-200 hover:-translate-y-1"><Settings size={22} /> 선생님으로 교실 열기</button>
                  <div className="relative py-2"><div className="absolute inset-0 flex items-center"><div className="w-full border-t-2 border-dashed border-slate-200"></div></div><div className="relative flex justify-center"><span className="bg-transparent px-4 text-xs font-black text-slate-400 uppercase tracking-widest">우리 반 학생들</span></div></div>

                        <Smile size={13} className="text-indigo-400 shrink-0"/>

                  </div>
                </div>
              </div>
            </div>
          ) : (
            <div className="min-h-screen bg-[#FFF9F0] font-sans text-slate-800">
              <header className="bg-white/80 backdrop-blur-md shadow-sm border-b-4 border-indigo-100 px-6 py-4 flex justify-between items-center sticky top-0 z-10 hidden-on-canvas">
                <h1 className="text-xl md:text-2xl font-black text-indigo-600 flex items-center gap-2 tracking-tight"><Palette className="hidden md:block text-purple-500" strokeWidth={3}/> <span className="hidden md:inline">스마트 학습지 교실 ✨</span><span className="md:hidden">{schoolInfo.grade}-{schoolInfo.classNum} 교실</span></h1>
                <div className="flex items-center gap-4">
                  <span className="font-bold bg-indigo-50 text-indigo-700 border border-indigo-100 px-4 py-2 rounded-full text-xs md:text-sm flex items-center gap-1.5 shadow-sm">{role === 'teacher' ? '👩‍🏫 선생님 모드' : `👦 ${role.name} 학생`}</span>

              <main className="p-4 md:p-8 max-w-7xl mx-auto">

              </main>

    // ==========================================
    // TEACHER DASHBOARD
    // ==========================================
    function TeacherDashboard({ assignments, submissions, students, credentials, schoolInfo, showAlert, showConfirm }) {
        const [showCreateForm, setShowCreateForm] = useState(false);
        const [selectedAssignment, setSelectedAssignment] = useState(null);
        const [showSettingsModal, setShowSettingsModal] = useState(false); 
        // ✏️ [기능-수정] 이미 만들어진 과제의 배경/안내사항을 나중에 수정할 수 있게 함
        const [editingAssignment, setEditingAssignment] = useState(null);
        const [assignmentTab, setAssignmentTab] = useState('active'); 
        // 📤 [연습장 제출] 교사용 메인 탭 (과제 관리 / 제출한 연습장)
        const [mainTab, setMainTab] = useState('assignments');

        const [newTeacherPassword, setNewTeacherPassword] = useState('');
        const [passwordConfirm, setNewPasswordConfirm] = useState('');
        const [searchStudent, setSearchStudent] = useState('');
        const [bulkStudentInput, setBulkStudentInput] = useState(''); 
        const [tempSchoolInfo, setTempSchoolInfo] = useState(schoolInfo);
        // 🗑️ 종료된 과제 선택 삭제용 상태 (탭 전환 시 초기화)
        const [selectedClosedIds, setSelectedClosedIds] = useState([]);
        useEffect(() => { setSelectedClosedIds([]); }, [assignmentTab]);

        useEffect(() => { setTempSchoolInfo(schoolInfo); }, [schoolInfo, showSettingsModal]);

        const getLaggingStudents = () => {
          const lagging = students.map(student => {
            let missingCount = 0;
            assignments.forEach(assign => {
              const sub = submissions.find(s => s.assignmentId === assign.id && s.studentId === student.id);
              if (!sub || (sub.status !== 'submitted' && sub.status !== 'graded')) { missingCount++; }
            });
            return { ...student, missingCount };
          }).filter(s => s.missingCount >= 3);
          return lagging.sort((a, b) => b.missingCount - a.missingCount);
        };
      
        const laggingStudents = getLaggingStudents();
        const activeAssignments = assignments.filter(a => a.status !== 'closed');
        const closedAssignments = assignments.filter(a => a.status === 'closed');
        const displayedAssignments = assignmentTab === 'active' ? activeAssignments : closedAssignments;

        const handleResetStudentPassword = async (studentId, studentName) => {
          showConfirm('비밀번호 초기화', `정말로 ${studentName} 학생의 비밀번호를 0000으로 초기화하시겠습니까?`, async () => {
              try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'credentials', studentId), { password: '0000' }); showAlert('초기화 성공', `${studentName} 학생의 비밀번호가 0000으로 성공적으로 초기화되었습니다.`); } catch (e) { showAlert('오류', '데이터베이스 수정 중 오류가 발생했습니다.'); }
          });
        };

        const handleChangeTeacherPassword = async (e) => {
          e.preventDefault();
          if (!newTeacherPassword) return showAlert('경고', '새 비밀번호를 입력해주세요.');
          if (newTeacherPassword !== passwordConfirm) return showAlert('오류', '비밀번호 확인이 일치하지 않습니다.');

                  <div className="h-full min-h-[400px] bg-white border-4 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center text-slate-400 font-bold gap-4">
                    <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 mb-2"><FileText size={32}/></div>
                    좌측에서 과제를 선택하면<br/>학생들의 제출물과 그림을 볼 수 있어요! 👀
                  </div>
                )}
              </div>
            </div>
            )}
          </div>
        );
    }

    function CreateAssignmentForm({ onClose, showAlert }) {
        const [title, setTitle] = useState('');
        const [instructions, setInstructions] = useState('');
        const [deadline, setDeadline] = useState('');
        const [orientation, setOrientation] = useState('portrait');
        // 📤 [기능-부분제출] 부분 제출 허용 여부 — 학생이 원하는 페이지만 골라 제출 가능
        const [allowPartialSubmit, setAllowPartialSubmit] = useState(false);
        
        const [baseImages, setBaseImages] = useState([]); 
        const [isConvertingPdf, setIsConvertingPdf] = useState(false);

        // 📌 PDF 페이지 범위 선택용 상태
        const [pdfPendingDoc, setPdfPendingDoc] = useState(null);
        const [pdfTotalPages, setPdfTotalPages] = useState(0);
        const [pdfStartPage, setPdfStartPage] = useState(1);
        const [pdfEndPage, setPdfEndPage] = useState(1);
        const [showPageRangeModal, setShowPageRangeModal] = useState(false);

        // 📎 선생님 첨부 파일 (HWP/DOC/PPT 등 - 학생에게 다운로드 형태로 제공)
        const [teacherAttachment, setTeacherAttachment] = useState(null);

        const [refImageUrl, setRefImageUrl] = useState('');
        const [refVideoUrl, setRefVideoUrl] = useState('');
        const [refLinkUrl, setRefLinkUrl] = useState('');

        // 📎 HWP/DOC/PPT 등 브라우저 렌더 불가 포맷 확장자 체크
        const isAttachmentExt = (name) => /\.(hwp|hwpx|doc|docx|ppt|pptx|xls|xlsx|txt|zip|rar)$/i.test(name || '');

        // 📁 파일을 base64 data URL로 읽는 유틸
        const readFileAsDataURL = (file) => new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });

        // 🔄 실제 PDF → 이미지 변환 (선택한 페이지 범위)
        const convertPdfPagesToImages = async (pdf, startPage, endPage) => {
          const extracted = [];
          const s = Math.max(1, Math.min(startPage, pdf.numPages));
          const e = Math.max(s, Math.min(endPage, pdf.numPages));
          for (let i = s; i <= e; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2.0 });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            extracted.push(canvas.toDataURL('image/jpeg', 0.85));
          }
          return extracted;
        };

        // ▶️ 페이지 범위 모달의 "변환 시작" 클릭 시
        const handleConfirmPageRange = async () => {
          if (!pdfPendingDoc) return;
          setShowPageRangeModal(false);
          setIsConvertingPdf(true);
          try {
            const imgs = await convertPdfPagesToImages(pdfPendingDoc, pdfStartPage, pdfEndPage);
            setBaseImages(imgs);
            showAlert('변환 완료! ✨', `총 ${imgs.length}장의 PDF 페이지가 고화질 배경으로 적용되었습니다.`);
          } catch (err) {
            console.error(err);
            showAlert('오류', 'PDF 변환에 실패했습니다.');
          } finally {
            setIsConvertingPdf(false);
            setPdfPendingDoc(null);
          }
        };

        const handleBaseImageUpload = async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          // 1) PDF: 로드 후 페이지 범위 선택 모달 오픈
          if (file.type === 'application/pdf' || /\.pdf$/i.test(file.name)) {
            setIsConvertingPdf(true);
            try {
              const pdfjsLib = await loadPdfJs();
              const arrayBuffer = await file.arrayBuffer();
              const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
              setPdfPendingDoc(pdf);
              setPdfTotalPages(pdf.numPages);
              setPdfStartPage(1);
              setPdfEndPage(Math.min(pdf.numPages, 5));
              setShowPageRangeModal(true);
            } catch (err) {
              console.error(err);
              showAlert('오류', 'PDF 파일을 열지 못했습니다.');
            } finally {
              setIsConvertingPdf(false);
            }
            return;
          }

          // 2) 이미지 (JPG/PNG/WebP 등)
          if (file.type.startsWith('image/')) {
            compressImage(URL.createObjectURL(file), (compressedUrl) => setBaseImages([compressedUrl]));
            return;
          }

          // 3) HWP/DOC/PPT 등 렌더 불가 포맷 → 학생용 다운로드 첨부파일로 저장
          if (isAttachmentExt(file.name)) {
            const MAX_ATTACH = 900 * 1024; // 파이어스토어 1MB 제한 감안 (900KB)
            if (file.size > MAX_ATTACH) {
              showAlert('파일이 너무 큽니다', `첨부 파일은 최대 900KB까지 지원됩니다.\n선택하신 파일: ${(file.size/1024).toFixed(0)}KB\n\n💡 HWP/DOC 파일을 PDF로 저장하신 뒤 다시 올려주시면 배경 이미지로 변환됩니다.`);
              return;
            }
            try {
              const dataUrl = await readFileAsDataURL(file);
              setTeacherAttachment({ name: file.name, dataUrl, size: file.size });
              showAlert('첨부 완료 📎', `"${file.name}" 파일이 학생에게 다운로드 가능한 첨부파일로 등록되었습니다.\n\n※ HWP 등은 브라우저에서 배경으로 렌더링할 수 없어 다운로드 형태로 제공됩니다.`);
            } catch (err) {
              showAlert('오류', '파일을 읽는 중 문제가 발생했습니다.');
            }
            return;
          }

          showAlert('알림', '지원하지 않는 파일 형식입니다.\n이미지(JPG/PNG), PDF, HWP, DOC(X), PPT(X) 파일을 업로드해주세요.');
        };

        const handleImageUpload = (e) => {
          const file = e.target.files[0];
          if (file) {
            compressImage(URL.createObjectURL(file), (compressedUrl) => setRefImageUrl(compressedUrl));
          }
        };
      
        const handleSubmit = async (e) => {
          e.preventDefault();
          if (!title) return showAlert('앗!', '과제 제목을 예쁘게 지어주세요! ✏️');
          const newAssignment = { title, instructions, deadline, orientation, baseImages, refImageUrl, refVideoUrl, refLinkUrl, teacherAttachment, allowPartialSubmit, createdAt: Date.now(), status: 'active' };
          try {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'assignments'), newAssignment);
            onClose();
          } catch (error) { showAlert("오류", "오류가 발생했습니다."); }
        };
      
        return (
          <form onSubmit={handleSubmit} className="bg-white p-8 rounded-[2rem] shadow-2xl border-4 border-indigo-50 mb-8 animate-fade-in-down">
            <h2 className="text-2xl font-black text-slate-800 mb-6 flex items-center gap-2 border-b-2 border-slate-100 pb-4">
              <div className="p-2 bg-indigo-100 text-indigo-600 rounded-2xl"><Plus size={24} strokeWidth={3}/></div> 새로운 학습지 만들기 🌟
            </h2>
            
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div className="space-y-5">
                <div className="bg-slate-50 p-5 rounded-3xl border border-slate-100 space-y-4">
                  <div>
                    <label className="block text-sm font-black text-slate-700 mb-2">과제 제목 📌</label>
                    <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} className="w-full bg-white border-2 border-slate-200 rounded-2xl p-3 font-bold text-slate-700 outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100 transition-all" placeholder="예: 3단원 소수의 나눗셈 정복하기" />
                  </div>
                  <div>
                    <label className="block text-sm font-black text-slate-700 mb-2">제출 기한 ⏰</label>
                    <input type="date" value={deadline} onChange={(e) => setDeadline(e.target.value)} className="w-full bg-white border-2 border-slate-200 rounded-2xl p-3 font-bold text-slate-700 outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100 transition-all" />
                  </div>
                </div>

                <div className="bg-slate-50 p-5 rounded-3xl border border-slate-100 space-y-4">
                  <div>
                    <label className="block text-sm font-black text-slate-700 mb-2">학습지 방향 설정 (A4)</label>
                    <div className="flex gap-3">
                      <label className={`flex-1 flex items-center justify-center gap-2 cursor-pointer font-black p-3 rounded-2xl border-2 transition-all ${orientation === 'portrait' ? 'bg-indigo-50 border-indigo-400 text-indigo-700' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-100'}`}>
                        <input type="radio" checked={orientation==='portrait'} onChange={()=>setOrientation('portrait')} className="hidden"/> 📄 세로형
                      </label>
                      <label className={`flex-1 flex items-center justify-center gap-2 cursor-pointer font-black p-3 rounded-2xl border-2 transition-all ${orientation === 'landscape' ? 'bg-indigo-50 border-indigo-400 text-indigo-700' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-100'}`}>
                        <input type="radio" checked={orientation==='landscape'} onChange={()=>setOrientation('landscape')} className="hidden"/> 📝 가로형
                      </label>
                    </div>
                  </div>

                  {/* 📤 [기능-부분제출] 부분 제출 허용 옵션 */}
                  <div>
                    <label className="flex items-start gap-3 cursor-pointer p-3 bg-white border-2 border-slate-200 rounded-2xl hover:border-teal-300 hover:bg-teal-50/40 transition-all">
                      <input 
                        type="checkbox" 
                        checked={allowPartialSubmit} 
                        onChange={(e) => setAllowPartialSubmit(e.target.checked)} 
                        className="mt-0.5 w-5 h-5 accent-teal-500 shrink-0"
                      />
                      <div className="flex-1">
                        <span className="text-sm font-black text-slate-700 flex items-center gap-1.5"><Send size={14} className="text-teal-500"/> 부분 제출 허용하기 (선택)</span>
                        <span className="text-[11px] font-bold text-slate-400 block mt-0.5">체크 시, 학생이 여러 페이지 중 원하는 페이지만 골라서 제출할 수 있어요.</span>
                      </div>
                    </label>
                  </div>

                  <div>
                    <label className="block text-sm font-black text-slate-700 mb-2 flex items-center gap-1"><ImageIcon size={16}/> 학습지 바탕 파일(PDF/이미지/HWP) 올리기</label>
                    <div className={`relative border-2 border-dashed ${isConvertingPdf ? 'border-amber-400 bg-amber-50' : 'border-indigo-200 bg-indigo-50/50 hover:bg-indigo-50'} rounded-2xl p-6 text-center transition-colors cursor-pointer`}>
                       {!isConvertingPdf && <input type="file" accept="image/*,application/pdf,.hwp,.hwpx,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt" onChange={handleBaseImageUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />}
                       
                       {isConvertingPdf ? (
                           <div className="flex flex-col items-center gap-2">
                               <div className="w-12 h-12 border-4 border-amber-400 border-t-transparent rounded-full animate-spin"></div>
                               <span className="text-sm font-bold text-amber-600">PDF를 도화지로 굽는 중...</span>
                           </div>
                       ) : baseImages.length > 0 ? (
                           <div className="flex flex-col items-center gap-2">
                               <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center"><Check size={24}/></div>
                               <span className="text-sm font-bold text-emerald-600">배경 {baseImages.length}장이 등록되었습니다!</span>
                               <span className="text-xs text-slate-400">클릭하여 다른 파일로 변경 가능</span>
                           </div>
                       ) : (
                           <div className="flex flex-col items-center gap-2">
                               <DownloadCloud size={28} className="text-indigo-400"/>
                               <span className="text-sm font-bold text-indigo-500">클릭하여 파일 업로드 (PDF/이미지/HWP)</span>
                               <span className="text-xs text-slate-400">PDF·이미지: 도화지 배경으로 자동 변환<br/>HWP·DOC·PPT: 학생에게 다운로드 첨부파일로 제공</span>
                           </div>
                       )}
                    </div>
                    {/* 📎 HWP/오피스 첨부 파일 미리보기 */}
                    {teacherAttachment && (
                       <div className="mt-3 bg-teal-50 border-2 border-teal-100 rounded-2xl p-3 flex items-center gap-3">
                          <div className="bg-teal-100 text-teal-600 p-2 rounded-xl shrink-0"><Paperclip size={18}/></div>
                          <div className="flex-1 min-w-0">
                             <p className="text-xs font-black text-teal-700 truncate">{teacherAttachment.name}</p>
                             <p className="text-[10px] font-bold text-teal-500">첨부파일 · {(teacherAttachment.size/1024).toFixed(0)}KB · 학생에게 다운로드 제공</p>
                          </div>
                          <button type="button" onClick={() => setTeacherAttachment(null)} className="p-1.5 text-teal-500 hover:text-rose-500 bg-white rounded-lg shrink-0"><X size={14}/></button>
                       </div>
                    )}
                  </div>
                </div>
              </div>

              <div className="space-y-5">
                <div className="bg-amber-50 p-5 rounded-3xl border border-amber-100 h-full flex flex-col">
                  <label className="block text-sm font-black text-amber-900 mb-2 flex items-center gap-2"><AlertCircle size={16}/> 다정한 공지사항 남기기</label>
                  <textarea value={instructions} onChange={(e) => setInstructions(e.target.value)} className="w-full flex-1 min-h-[100px] bg-white border-2 border-amber-200 rounded-2xl p-4 font-bold text-sm text-slate-700 outline-none focus:border-amber-400 focus:ring-4 focus:ring-amber-100 transition-all custom-scrollbar" placeholder="안녕 얘들아! 이번 과제는..."></textarea>

                  <div className="mt-5 space-y-4 pt-4 border-t-2 border-amber-200/50">
                    <span className="text-sm font-black text-amber-900 flex items-center gap-1.5"><Lightbulb size={18} className="text-amber-500"/> 학생 도움용 참고 자료 (선택)</span>
                    
                    <div className="space-y-3">
                      <div className="bg-white p-3 rounded-2xl border border-amber-200 shadow-sm flex items-center gap-3">
                        <div className="bg-amber-100 p-2 rounded-xl text-amber-600"><ImageIcon size={16}/></div>
                        <div className="flex-1 space-y-2">
                          <div className="flex gap-2">
                            <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" id="teacher-img-upload" />
                            <label htmlFor="teacher-img-upload" className="px-3 py-1.5 bg-amber-100 hover:bg-amber-200 text-amber-700 text-[11px] font-black rounded-xl cursor-pointer transition-colors whitespace-nowrap">사진 추가</label>
                            <input type="text" value={refImageUrl} onChange={(e) => setRefImageUrl(e.target.value)} className="w-full bg-transparent text-xs font-bold text-slate-600 outline-none placeholder-slate-300" placeholder="또는 사진(URL) 링크 입력" />
                          </div>
                        </div>
                      </div>

                      <div className="bg-white p-3 rounded-2xl border border-amber-200 shadow-sm flex items-center gap-3">
                        <div className="bg-rose-100 p-2 rounded-xl text-rose-600"><Video size={16}/></div>
                        <input type="text" value={refVideoUrl} onChange={(e) => setRefVideoUrl(e.target.value)} className="w-full bg-transparent text-xs font-bold text-slate-600 outline-none placeholder-slate-300" placeholder="관련 유튜브/영상 URL" />
                      </div>

                      <div className="bg-white p-3 rounded-2xl border border-amber-200 shadow-sm flex items-center gap-3">
                        <div className="bg-blue-100 p-2 rounded-xl text-blue-600"><LinkIcon size={16}/></div>
                        <input type="text" value={refLinkUrl} onChange={(e) => setRefLinkUrl(e.target.value)} className="w-full bg-transparent text-xs font-bold text-slate-600 outline-none placeholder-slate-300" placeholder="참고 웹사이트 주소" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="mt-6 flex justify-end gap-3 border-t pt-4">
              <button type="button" onClick={onClose} className="px-5 py-2 bg-gray-100 hover:bg-gray-200 rounded-xl font-bold text-gray-700 transition">취소</button>
              <button type="submit" disabled={isConvertingPdf} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white rounded-xl font-bold shadow-md transition">학습지 생성 및 배포</button>
            </div>

            {/* 📌 PDF 페이지 범위 선택 모달 */}
            {showPageRangeModal && (
              <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[200] flex items-center justify-center p-4" onClick={(e) => e.stopPropagation()}>
                <div className="bg-white rounded-[2rem] shadow-2xl max-w-md w-full p-7 border-4 border-indigo-50 animate-fade-in">
                  <h3 className="text-xl font-black text-slate-800 flex items-center gap-2 mb-2">
                    <div className="p-2 bg-indigo-100 text-indigo-600 rounded-xl"><FileText size={22}/></div>
                    PDF 페이지 범위 선택
                  </h3>
                  <p className="text-sm font-bold text-slate-500 mb-5">총 <span className="text-indigo-600 font-black">{pdfTotalPages}</span>쪽 중 변환할 페이지 범위를 지정해주세요.</p>

                  <div className="bg-slate-50 rounded-2xl border border-slate-100 p-5 space-y-4">
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-xs font-black text-slate-500 mb-1.5">시작 페이지</label>
                        <input type="number" min="1" max={pdfTotalPages} value={pdfStartPage}
                          onChange={(e) => {
                            const v = parseInt(e.target.value) || 1;
                            const clamped = Math.max(1, Math.min(v, pdfTotalPages));
                            setPdfStartPage(clamped);
                            if (clamped > pdfEndPage) setPdfEndPage(clamped);
                          }}
                          className="w-full bg-white border-2 border-slate-200 rounded-xl p-2.5 font-black text-slate-700 outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100"/>
                      </div>
                      <div>
                        <label className="block text-xs font-black text-slate-500 mb-1.5">끝 페이지</label>
                        <input type="number" min={pdfStartPage} max={pdfTotalPages} value={pdfEndPage}
                          onChange={(e) => {
                            const v = parseInt(e.target.value) || 1;
                            const clamped = Math.max(pdfStartPage, Math.min(v, pdfTotalPages));
                            setPdfEndPage(clamped);
                          }}
                          className="w-full bg-white border-2 border-slate-200 rounded-xl p-2.5 font-black text-slate-700 outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100"/>
                      </div>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      <button type="button" onClick={() => { setPdfStartPage(1); setPdfEndPage(pdfTotalPages); }} className="px-3 py-1.5 bg-white border-2 border-slate-200 hover:border-indigo-300 text-slate-600 rounded-xl font-black text-xs">전체 선택</button>
                      <button type="button" onClick={() => { setPdfStartPage(1); setPdfEndPage(Math.min(5, pdfTotalPages)); }} className="px-3 py-1.5 bg-white border-2 border-slate-200 hover:border-indigo-300 text-slate-600 rounded-xl font-black text-xs">앞 5쪽</button>
                      <span className="ml-auto text-xs font-black text-indigo-600 self-center">선택: {Math.max(0, pdfEndPage - pdfStartPage + 1)}쪽</span>
                    </div>
                  </div>

                  <div className="mt-6 flex justify-end gap-2">
                    <button type="button" onClick={() => { setShowPageRangeModal(false); setPdfPendingDoc(null); }} className="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-xl font-bold text-gray-700 text-sm">취소</button>
                    <button type="button" onClick={handleConfirmPageRange} className="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-black text-sm shadow-md">변환 시작 ✨</button>
                  </div>
                </div>
              </div>
            )}
          </form>
        )
    }
      
    // ✏️ [기능-수정] 이미 만들어진 과제의 학습지 배경(baseImages) 과 다정한 공지사항(instructions),
    // 학생 부분 제출 허용 여부, 참고 자료 URL 등을 나중에 수정할 수 있게 해주는 모달 컴포넌트.
    // - 기존 과제 문서를 updateDoc으로 갱신 (Firebase 규칙과 무관하게 필드만 수정)
    // - 학생 제출 데이터는 건드리지 않음
    function EditAssignmentModal({ assignment, onClose, showAlert }) {
        const [title, setTitle] = useState(assignment.title || '');
        const [instructions, setInstructions] = useState(assignment.instructions || '');
        const [deadline, setDeadline] = useState(assignment.deadline || '');
        const [baseImages, setBaseImages] = useState(assignment.baseImages || (assignment.baseImage ? [assignment.baseImage] : []));
        const [isConvertingPdf, setIsConvertingPdf] = useState(false);
        const [allowPartialSubmit, setAllowPartialSubmit] = useState(!!assignment.allowPartialSubmit);
        const [refImageUrl, setRefImageUrl] = useState(assignment.refImageUrl || '');
        const [refVideoUrl, setRefVideoUrl] = useState(assignment.refVideoUrl || '');
        const [refLinkUrl, setRefLinkUrl] = useState(assignment.refLinkUrl || '');
        const [isSaving, setIsSaving] = useState(false);

        // 📌 PDF 페이지 범위 선택용 상태 (CreateAssignmentForm과 동일 로직)
        const [pdfPendingDoc, setPdfPendingDoc] = useState(null);
        const [pdfTotalPages, setPdfTotalPages] = useState(0);
        const [pdfStartPage, setPdfStartPage] = useState(1);
        const [pdfEndPage, setPdfEndPage] = useState(1);
        const [showPageRangeModal, setShowPageRangeModal] = useState(false);

        const convertPdfPagesToImages = async (pdf, startPage, endPage) => {
          const extracted = [];
          const s = Math.max(1, Math.min(startPage, pdf.numPages));
          const e = Math.max(s, Math.min(endPage, pdf.numPages));
          for (let i = s; i <= e; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2.0 });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            extracted.push(canvas.toDataURL('image/jpeg', 0.85));
          }
          return extracted;
        };

        const handleConfirmPageRange = async () => {
          if (!pdfPendingDoc) return;
          setShowPageRangeModal(false);
          setIsConvertingPdf(true);
          try {
            const imgs = await convertPdfPagesToImages(pdfPendingDoc, pdfStartPage, pdfEndPage);
            setBaseImages(imgs);
            showAlert('변환 완료! ✨', `총 ${imgs.length}장의 PDF 페이지가 새 배경으로 적용되었습니다.`);
          } catch (err) {
            console.error(err);
            showAlert('오류', 'PDF 변환에 실패했습니다.');
          } finally {
            setIsConvertingPdf(false);
            setPdfPendingDoc(null);
          }
        };

        const handleBaseImageUpload = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          if (file.type === 'application/pdf' || /\.pdf$/i.test(file.name)) {
            setIsConvertingPdf(true);
            try {
              const pdfjsLib = await loadPdfJs();
              const arrayBuffer = await file.arrayBuffer();
              const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
              setPdfPendingDoc(pdf);
              setPdfTotalPages(pdf.numPages);
              setPdfStartPage(1);
              setPdfEndPage(Math.min(pdf.numPages, 5));
              setShowPageRangeModal(true);
            } catch (err) {
              console.error(err);
              showAlert('오류', 'PDF 파일을 열지 못했습니다.');
            } finally {
              setIsConvertingPdf(false);
            }
            return;
          }
          if (file.type.startsWith('image/')) {
            compressImage(URL.createObjectURL(file), (compressedUrl) => setBaseImages([compressedUrl]));
            return;
          }
          showAlert('알림', '수정 화면에서는 이미지(JPG/PNG) 또는 PDF 파일만 배경으로 지원합니다.');
        };

        const handleSave = async () => {
          if (!title.trim()) return showAlert('앗!', '과제 제목을 비워둘 수 없어요.');
          setIsSaving(true);
          try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', assignment.id), {
              title: title.trim(),
              instructions,
              deadline,
              baseImages,
              allowPartialSubmit,
              refImageUrl,
              refVideoUrl,
              refLinkUrl,
              updatedAt: Date.now()
            });
            showAlert('수정 완료 ✏️', '과제 내용이 성공적으로 업데이트되었습니다!');
            onClose();
          } catch (err) {
            console.error(err);
            showAlert('오류', '과제 수정 중 문제가 발생했어요.');
          } finally {
            setIsSaving(false);
          }
        };

        return (
          <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[150] flex items-center justify-center p-4 animate-fade-in">
            <div className="bg-white rounded-[2rem] shadow-2xl max-w-3xl w-full p-7 border-4 border-amber-100 max-h-[92vh] overflow-y-auto custom-scrollbar">
              <div className="flex justify-between items-center border-b-2 border-slate-100 pb-4 mb-5">
                <h3 className="text-xl font-black text-slate-800 flex items-center gap-2">
                  <div className="p-2 bg-amber-100 text-amber-600 rounded-2xl"><Edit3 size={22} strokeWidth={2.5}/></div>
                  과제 수정하기
                </h3>
                <button onClick={onClose} className="p-2 bg-slate-100 hover:bg-rose-100 text-slate-400 hover:text-rose-500 rounded-full transition-colors"><X size={20}/></button>
              </div>

              <div className="space-y-5">
                <div>
                  <label className="block text-sm font-black text-slate-700 mb-2">과제 제목 📌</label>
                  <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} className="w-full bg-white border-2 border-slate-200 rounded-2xl p-3 font-bold text-slate-700 outline-none focus:border-amber-400 focus:ring-4 focus:ring-amber-100 transition-all" />
                </div>

                <div>
                  <label className="block text-sm font-black text-slate-700 mb-2">제출 기한 ⏰</label>
                  <input type="date" value={deadline} onChange={(e) => setDeadline(e.target.value)} className="w-full bg-white border-2 border-slate-200 rounded-2xl p-3 font-bold text-slate-700 outline-none focus:border-amber-400 focus:ring-4 focus:ring-amber-100 transition-all" />
                </div>

                <div>
                  <label className="block text-sm font-black text-slate-700 mb-2 flex items-center gap-1"><AlertCircle size={16}/> 다정한 공지사항</label>
                  <textarea value={instructions} onChange={(e) => setInstructions(e.target.value)} className="w-full min-h-[110px] bg-white border-2 border-amber-200 rounded-2xl p-4 font-bold text-sm text-slate-700 outline-none focus:border-amber-400 focus:ring-4 focus:ring-amber-100 transition-all custom-scrollbar" placeholder="학생들에게 전할 안내사항..."></textarea>
                </div>

                {/* 📤 [기능-부분제출] 부분 제출 허용 옵션 */}
                <label className="flex items-start gap-3 cursor-pointer p-3 bg-white border-2 border-slate-200 rounded-2xl hover:border-teal-300 hover:bg-teal-50/40 transition-all">
                  <input 
                    type="checkbox" 
                    checked={allowPartialSubmit} 
                    onChange={(e) => setAllowPartialSubmit(e.target.checked)} 
                    className="mt-0.5 w-5 h-5 accent-teal-500 shrink-0"
                  />
                  <div className="flex-1">
                    <span className="text-sm font-black text-slate-700 flex items-center gap-1.5"><Send size={14} className="text-teal-500"/> 부분 제출 허용하기</span>
                    <span className="text-[11px] font-bold text-slate-400 block mt-0.5">체크 시, 학생이 여러 페이지 중 원하는 페이지만 골라서 제출할 수 있어요.</span>
                  </div>
                </label>

                <div>
                  <label className="block text-sm font-black text-slate-700 mb-2 flex items-center gap-1"><ImageIcon size={16}/> 학습지 배경 이미지/PDF 재업로드</label>
                  <div className={`relative border-2 border-dashed ${isConvertingPdf ? 'border-amber-400 bg-amber-50' : 'border-amber-200 bg-amber-50/40 hover:bg-amber-50'} rounded-2xl p-5 text-center transition-colors cursor-pointer`}>
                    {!isConvertingPdf && <input type="file" accept="image/*,application/pdf" onChange={handleBaseImageUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />}
                    {isConvertingPdf ? (
                      <div className="flex flex-col items-center gap-2">
                        <div className="w-10 h-10 border-4 border-amber-400 border-t-transparent rounded-full animate-spin"></div>
                        <span className="text-xs font-bold text-amber-600">PDF를 도화지로 굽는 중...</span>
                      </div>
                    ) : baseImages.length > 0 ? (
                      <div className="flex flex-col items-center gap-2">
                        <div className="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center"><Check size={20}/></div>
                        <span className="text-sm font-bold text-emerald-600">배경 {baseImages.length}장 등록됨</span>
                        <span className="text-[11px] text-slate-400">클릭해서 다른 파일로 교체 가능</span>
                      </div>
                    ) : (
                      <div className="flex flex-col items-center gap-2">
                        <DownloadCloud size={24} className="text-amber-500"/>
                        <span className="text-sm font-bold text-amber-600">클릭하여 파일 업로드 (PDF/이미지)</span>
                      </div>
                    )}
                  </div>
                  {baseImages.length > 0 && (
                    <div className="mt-3 flex gap-2 overflow-x-auto pb-1 custom-scrollbar">
                      {baseImages.map((img, i) => (
                        <div key={i} className="shrink-0 w-16 h-20 border-2 border-slate-200 rounded-xl overflow-hidden bg-white relative">
                          <img src={img} alt={`page ${i+1}`} className="w-full h-full object-contain"/>
                          <span className="absolute bottom-0 right-0 bg-white/90 text-[10px] font-black text-slate-600 px-1 rounded-tl-md">{i+1}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  <p className="text-[11px] font-bold text-slate-400 mt-2">⚠️ 배경을 바꾸면 이미 그린 학생의 필기 레이어는 그대로 유지되지만, 학생 화면의 배경이 변경됩니다.</p>
                </div>

                <div className="bg-amber-50/60 border-2 border-amber-100 rounded-2xl p-4 space-y-3">
                  <span className="text-xs font-black text-amber-900 flex items-center gap-1.5"><Lightbulb size={14}/> 참고 자료 URL (선택)</span>
                  <div className="flex items-center gap-2 bg-white p-2 rounded-xl border border-amber-100">
                    <div className="bg-amber-100 p-1.5 rounded-lg text-amber-600"><ImageIcon size={14}/></div>
                    <input type="text" value={refImageUrl} onChange={(e) => setRefImageUrl(e.target.value)} className="w-full bg-transparent text-xs font-bold text-slate-600 outline-none placeholder-slate-300" placeholder="참고 사진 URL" />
                  </div>
                  <div className="flex items-center gap-2 bg-white p-2 rounded-xl border border-amber-100">
                    <div className="bg-rose-100 p-1.5 rounded-lg text-rose-600"><Video size={14}/></div>
                    <input type="text" value={refVideoUrl} onChange={(e) => setRefVideoUrl(e.target.value)} className="w-full bg-transparent text-xs font-bold text-slate-600 outline-none placeholder-slate-300" placeholder="참고 영상 URL" />
                  </div>
                  <div className="flex items-center gap-2 bg-white p-2 rounded-xl border border-amber-100">
                    <div className="bg-blue-100 p-1.5 rounded-lg text-blue-600"><LinkIcon size={14}/></div>
                    <input type="text" value={refLinkUrl} onChange={(e) => setRefLinkUrl(e.target.value)} className="w-full bg-transparent text-xs font-bold text-slate-600 outline-none placeholder-slate-300" placeholder="참고 웹사이트 주소" />
                  </div>
                </div>
              </div>

              <div className="mt-6 flex justify-end gap-3 border-t-2 border-slate-100 pt-4">
                <button onClick={onClose} className="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 rounded-xl font-black text-gray-700 text-sm">취소</button>
                <button 
                  onClick={handleSave} 
                  disabled={isSaving || isConvertingPdf} 
                  className="px-6 py-2.5 bg-amber-500 hover:bg-amber-600 disabled:opacity-50 text-white rounded-xl font-black text-sm shadow-md flex items-center gap-2"
                >
                  {isSaving ? '저장 중...' : <><Check size={16} strokeWidth={3}/> 수정 내용 저장</>}
                </button>
              </div>

              {/* 📌 PDF 페이지 범위 선택 모달 */}
              {showPageRangeModal && (
                <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                  <div className="bg-white rounded-[2rem] shadow-2xl max-w-md w-full p-7 border-4 border-indigo-50 animate-fade-in">
                    <h3 className="text-xl font-black text-slate-800 flex items-center gap-2 mb-2">
                      <div className="p-2 bg-indigo-100 text-indigo-600 rounded-xl"><FileText size={22}/></div>
                      PDF 페이지 범위 선택
                    </h3>
                    <p className="text-sm font-bold text-slate-500 mb-5">총 <span className="text-indigo-600 font-black">{pdfTotalPages}</span>쪽 중 변환할 페이지 범위를 지정해주세요.</p>
                    <div className="bg-slate-50 rounded-2xl border border-slate-100 p-5 space-y-4">
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="block text-xs font-black text-slate-500 mb-1.5">시작 페이지</label>
                          <input type="number" min="1" max={pdfTotalPages} value={pdfStartPage}
                            onChange={(e) => {
                              const v = parseInt(e.target.value) || 1;
                              const clamped = Math.max(1, Math.min(v, pdfTotalPages));
                              setPdfStartPage(clamped);
                              if (clamped > pdfEndPage) setPdfEndPage(clamped);
                            }}
                            className="w-full bg-white border-2 border-slate-200 rounded-xl p-2.5 font-black text-slate-700 outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100"/>
                        </div>
                        <div>
                          <label className="block text-xs font-black text-slate-500 mb-1.5">끝 페이지</label>
                          <input type="number" min={pdfStartPage} max={pdfTotalPages} value={pdfEndPage}
                            onChange={(e) => {
                              const v = parseInt(e.target.value) || 1;
                              const clamped = Math.max(pdfStartPage, Math.min(v, pdfTotalPages));
                              setPdfEndPage(clamped);
                            }}
                            className="w-full bg-white border-2 border-slate-200 rounded-xl p-2.5 font-black text-slate-700 outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100"/>
                        </div>
                      </div>
                    </div>
                    <div className="mt-6 flex justify-end gap-2">
                      <button type="button" onClick={() => { setShowPageRangeModal(false); setPdfPendingDoc(null); }} className="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-xl font-bold text-gray-700 text-sm">취소</button>
                      <button type="button" onClick={handleConfirmPageRange} className="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-black text-sm shadow-md">변환 시작 ✨</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
    }

    function GradingPanel({ assignment, submissions, students, schoolInfo, showAlert, showConfirm }) {
        const [selectedSubmission, setSelectedSubmission] = useState(null);
        const [gradingPage, setGradingPage] = useState(0); 
        // 💾 선택형 다운로드를 위한 체크박스 State
        const [selectedSubmissions, setSelectedSubmissions] = useState([]);
        // 🔍 [기능15] 제출물 확대 보기 모달 & 확대 배율
        const [zoomModalOpen, setZoomModalOpen] = useState(false);
        const [zoomLevel, setZoomLevel] = useState(1);
        // 📅 [추가] 제출 마감일 수정 모달
        const [editingDeadline, setEditingDeadline] = useState(false);
        const [newDeadline, setNewDeadline] = useState(assignment.deadline || '');
        useEffect(() => { setNewDeadline(assignment.deadline || ''); }, [assignment.id, assignment.deadline]);

        const handleSaveDeadline = async () => {
          try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', assignment.id), { deadline: newDeadline || '' });
            showAlert('저장 완료 ✨', newDeadline ? `제출 마감일이 ${newDeadline}(으)로 수정되었습니다.` : '제출 마감일이 삭제되었습니다.');
            setEditingDeadline(false);
          } catch (e) {
            console.error(e);
            showAlert('오류', '마감일 수정 중 문제가 발생했습니다.');
          }
        };

        useEffect(() => { setGradingPage(0); setZoomModalOpen(false); setZoomLevel(1); }, [selectedSubmission]);

        const toggleAssignmentStatus = () => {
          const newStatus = assignment.status === 'closed' ? 'active' : 'closed';
          const actionText = newStatus === 'closed' ? '종료' : '다시 열기';
          
          showConfirm(`과제 ${actionText}`, `정말로 이 과제를 ${actionText}하시겠습니까?`, async () => {
            try {
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', assignment.id), { status: newStatus });
              showAlert('상태 변경 완료 ✨', `과제가 성공적으로 ${actionText}되었습니다!`);
              setSelectedSubmission(null);
            } catch (e) { showAlert('오류', '과제 상태 변경 중 오류가 발생했습니다.'); }
          });
        };

        const getStatusBadge = (sub) => {
          // 🔖 한 줄 표시를 위해 배지 문구는 짧게, whitespace-nowrap 처리
          if (!sub) return <span className="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-md whitespace-nowrap">미제출</span>;
          if (sub.status === 'submitted') return <span className="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded-md border border-indigo-200 whitespace-nowrap">제출완료 🔴</span>;
          if (sub.status === 'resubmit') return <span className="bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-md whitespace-nowrap">다시제출</span>;
          if (sub.status === 'graded') return <span className="bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-md whitespace-nowrap">평가완료 ⭐</span>;
          return <span className="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-md whitespace-nowrap">작성중</span>;
        }
      
        const handleFeedback = async (feedbackType) => {
          if (!selectedSubmission) return;
          let newStatus = 'graded';
          let feedbackText = feedbackType;
          if (feedbackType === 'resubmit') { newStatus = 'resubmit'; feedbackText = '조금 아쉬워요! 다시 확인해보고 제출해볼까요? 💪'; }
          try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', selectedSubmission.id), { status: newStatus, feedback: feedbackText, updatedAt: Date.now() });
            showAlert('피드백 전송 완료 ✨', '선생님의 다정한 피드백이 학생에게 바로 전달되었습니다!');
            setSelectedSubmission(null);
          } catch (e) { showAlert('오류', '오류 발생'); }
        };

        // 💾 선택형 일괄/개별 다운로드 기능 - 학습지 배경 + 학생 필기를 합성해 JPEG로 저장
        const composeAndDownload = (bgUrl, drawingUrl, fileName) => {
          return new Promise((resolve) => {
            const drawImg = new Image();
            drawImg.crossOrigin = 'anonymous';
            drawImg.onload = () => {
              const w = drawImg.width, h = drawImg.height;
              const canvas = document.createElement('canvas');
              canvas.width = w; canvas.height = h;
              const ctx = canvas.getContext('2d');
              ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);

              const finalize = () => {
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                resolve();
              };

              if (bgUrl) {
                const bgImg = new Image();
                bgImg.crossOrigin = 'anonymous';
                bgImg.onload = () => { ctx.drawImage(bgImg, 0, 0, w, h); ctx.drawImage(drawImg, 0, 0); finalize(); };
                bgImg.onerror = () => { ctx.drawImage(drawImg, 0, 0); finalize(); };
                bgImg.src = bgUrl;
              } else { ctx.drawImage(drawImg, 0, 0); finalize(); }
            };
            drawImg.onerror = () => resolve();
            drawImg.src = drawingUrl;
          });
        };

        const handleDownloadSelected = async () => {
          if(selectedSubmissions.length === 0) return showAlert('알림', '다운로드할 과제를 먼저 선택해주세요!');
          
          for (const id of selectedSubmissions) {
              const sub = submissions.find(s => s.id === id);
              if(!sub) continue;
              const pagesToDownload = sub.pagesData || [sub.drawingData];
              const baseImages = assignment.baseImages || [];
              
              for (let idx = 0; idx < pagesToDownload.length; idx++) {
                  const pageUrl = pagesToDownload[idx];
                  if(!pageUrl) continue;
                  const pageText = pagesToDownload.length > 1 ? `_${idx+1}쪽` : '';
                  const fileName = `[${schoolInfo.grade}학년${schoolInfo.classNum}반]_${sub.studentName}_${assignment.title}${pageText}.jpg`;
                  await composeAndDownload(baseImages[idx], pageUrl, fileName);
              }
          }
          showAlert('다운로드 완료 💾', '선택하신 과제가 학습지 배경과 함께 합성되어 컴퓨터로 다운로드 되었습니다.\n\n💡 브라우저 설정에서 "다운로드 전에 각 파일의 저장 위치 확인"을 켜두시면 원하는 폴더에 다른 이름으로 저장할 수 있습니다!');
          setSelectedSubmissions([]);
        };

        const hasStudentAttachments = selectedSubmission && (selectedSubmission.studentRefImageUrl || selectedSubmission.studentRefVideoUrl || selectedSubmission.studentRefLinkUrl || (selectedSubmission.studentFileType && selectedSubmission.studentFileType !== 'none'));
        const pagesData = selectedSubmission?.pagesData || (selectedSubmission?.drawingData ? [selectedSubmission.drawingData] : []);
      
        return (
          <div className="bg-white rounded-[2rem] shadow-xl border-4 border-slate-100 h-full flex flex-col overflow-hidden">
            {/* 📅 마감일 수정 모달 */}

                                <div className="min-w-0 flex-1">

                    <div className="bg-white p-5 rounded-3xl border-2 border-slate-200 shadow-sm flex flex-col gap-3">

                      <div className="flex flex-wrap gap-2">
                        <button onClick={() => handleFeedback('너무 멋져요! 최고! 🌟')} className="flex-1 min-w-[120px] py-3 bg-emerald-100 text-emerald-700 font-black rounded-2xl hover:bg-emerald-200 transition-all shadow-sm">최고! 🌟</button>
