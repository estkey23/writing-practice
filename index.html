          // 🔍 [줌 화질 개선] 학습지 배경 캔버스를 2배 해상도로 오버샘플링해서
          // 태블릿에서 확대해도 텍스트·이미지가 선명하게 유지되도록 함.
          // ctx.scale로 좌표계는 그대로 두어 이후 draw 코드는 수정 불필요.
          const BASE_DPR = 2;
          baseCanvas.width = w * BASE_DPR; baseCanvas.height = h * BASE_DPR;
          const bCtx = baseCanvas.getContext('2d');
          bCtx.scale(BASE_DPR, BASE_DPR);
          bCtx.imageSmoothingEnabled = true;
          if ('imageSmoothingQuality' in bCtx) bCtx.imageSmoothingQuality = 'high';
          bCtx.fillStyle = '#ffffff'; bCtx.fillRect(0, 0, w, h);
          
          // 🖼️ [기능7] 연습장은 학생이 첨부한 사진을 배경으로 사용, 없으면 기존 격자
          const practiceBg = assignment.isPractice ? (practiceBgImages[currentPageIndex] || null) : null;
          const currentBgUrl = practiceBg || bgImages[currentPageIndex];

          if (currentBgUrl) {
            const img = new Image();
            img.onload = () => {
               bCtx.clearRect(0, 0, w, h);
               bCtx.drawImage(img, 0, 0, w, h);
            };
            img.src = currentBgUrl;
          } 
          else if (assignment.isPractice || currentPageIndex > 0) {
            bCtx.strokeStyle = '#e2e8f0'; bCtx.lineWidth = 2; 
            for (let i = 30; i < h; i += 30) { bCtx.beginPath(); bCtx.moveTo(0, i); bCtx.lineTo(w, i); bCtx.stroke(); }
            for (let j = 30; j < w; j += 30) { bCtx.beginPath(); bCtx.moveTo(j, 0); bCtx.lineTo(j, h); bCtx.stroke(); }
            bCtx.fillStyle = '#6366f1'; bCtx.font = '900 24px sans-serif';
            bCtx.fillText(assignment.isPractice ? `📝 두뇌 팡팡 자유 연습장 🚀` : `📝 추가 풀이 노트 (Page ${currentPageIndex + 1})`, 30, 50);
          } else {
            bCtx.strokeStyle = '#e2e8f0'; bCtx.lineWidth = 1;
            for (let i = 40; i < h; i += 40) { bCtx.beginPath(); bCtx.moveTo(0, i); bCtx.lineTo(w, i); bCtx.stroke(); }
            bCtx.fillStyle = '#4f46e5'; bCtx.font = '900 26px sans-serif';
            bCtx.fillText(`🏫 ${schoolInfo.schoolName}학교 ${schoolInfo.grade}학년 ${schoolInfo.classNum}반 | ${assignment.title}`, 30, 50);
            bCtx.fillStyle = '#64748b'; bCtx.font = 'bold 16px sans-serif';
            bCtx.fillText(`나의 이름: ${student.name} 탐험가`, 30, 85);
            bCtx.strokeStyle = '#94a3b8'; bCtx.lineWidth = 3; bCtx.beginPath(); bCtx.moveTo(30, 110); bCtx.lineTo(w - 30, 110); bCtx.stroke();
            bCtx.fillStyle = '#1e293b'; bCtx.font = '900 18px sans-serif';
            bCtx.fillText(`Q1. 다음 분수 덧셈의 계산 과정을 예쁘게 적고 답을 구해보세요!`, 30, 160);
            bCtx.font = '900 32px sans-serif'; bCtx.fillText(`2  +  1  =  ?`, 80, 220);
            bCtx.font = 'bold 14px sans-serif'; bCtx.fillStyle = '#cbd5e1';
            bCtx.fillText(`(선생님께서 아직 실제 문제 이미지를 등록하지 않으셨어요!)`, 80, 260);
          }
        }
      }, [canvasSize.w, canvasSize.h, currentPageIndex, assignment, schoolInfo, practiceBgImages]); 

      useEffect(() => {
        if (canvasSize.w === 800 || canvasSize.w === 0) return; 
        const w = canvasSize.w; const h = canvasSize.h;

        const previewCanvas = previewCanvasRef.current;
        if (previewCanvas) { previewCanvas.width = w; previewCanvas.height = h; }

        layers.forEach(layer => {
          if (layer.id === 'base') return;
          const canvas = canvasRefs.current[layer.id];
          if (canvas) { canvas.width = w; canvas.height = h; canvas.getContext('2d').clearRect(0, 0, w, h); }
        });

        const pageDataUrl = pages[currentPageIndex];
        if (pageDataUrl) {
          const img = new Image();
          img.onload = () => { if (canvasRefs.current['layer_1']) canvasRefs.current['layer_1'].getContext('2d').drawImage(img, 0, 0, w, h); };
          img.src = pageDataUrl;
        }
      }, [canvasSize.w, canvasSize.h, currentPageIndex]);

      // 🩹 [기능1 수정] 되돌리기 로직 재설계
      //  - 스트로크 시작 전 캔버스 상태를 스냅샷으로 저장 (한 번의 작업 = 한 번의 undo)
      //  - 되돌리기 시 "현재" 캔버스 상태를 redoStack에 밀어넣어 복구 가능하게 함
      //  - 스택은 최대 30장까지 (오래된 것부터 자동 폐기)
      const pushUndoState = () => {
        if (isReadOnly || activeLayerId === 'base') return;
        const activeCanvas = canvasRefs.current[activeLayerId];
        if (!activeCanvas) return;
        const currentState = activeCanvas.toDataURL('image/png');
        setUndoStack(prev => {
          const currentStack = prev[activeLayerId] || [];
          const newStack = [...currentStack, currentState];
          if (newStack.length > 30) newStack.shift();
          return { ...prev, [activeLayerId]: newStack };
        });
        // 새 작업이 발생하면 redo 흐름은 끊김 → redoStack 비움
        setRedoStack(prev => ({ ...prev, [activeLayerId]: [] }));
      };

      const handleUndo = () => {
        if (isReadOnly || activeLayerId === 'base') return;
        const stack = undoStack[activeLayerId] || [];
        if (stack.length === 0) return showAlert('안내', '더 이상 되돌릴 작업이 없어요! 😅');

        const activeCanvas = canvasRefs.current[activeLayerId];
        if (!activeCanvas) return;
        // 🔁 되돌리기 전, 지금 상태를 redoStack에 저장 → "다시 복구" 가능
        const currentSnapshot = activeCanvas.toDataURL('image/png');
        setRedoStack(prev => {
          const rStack = prev[activeLayerId] || [];
          const newR = [...rStack, currentSnapshot];
          if (newR.length > 30) newR.shift();
          return { ...prev, [activeLayerId]: newR };
        });

        const previousState = stack[stack.length - 1];
        setUndoStack(prev => ({ ...prev, [activeLayerId]: stack.slice(0, -1) }));

        const img = new Image();
        img.onload = () => {
            const ctx = activeCanvas.getContext('2d');
            ctx.clearRect(0, 0, activeCanvas.width, activeCanvas.height);
            ctx.drawImage(img, 0, 0);
            saveProgress('in_progress');
        };
        img.src = previousState;
      };

      // 🔁 [기능2] 되돌린 작업을 다시 앞으로 (복구)
      const handleRedo = () => {
        if (isReadOnly || activeLayerId === 'base') return;
        const stack = redoStack[activeLayerId] || [];
        if (stack.length === 0) return showAlert('안내', '다시 복구할 작업이 없어요! 😅');

        const activeCanvas = canvasRefs.current[activeLayerId];
        if (!activeCanvas) return;
        // 현재 상태는 다시 undoStack으로 밀어넣기 → 재복구 후에도 undo 가능
        const nowSnapshot = activeCanvas.toDataURL('image/png');
        setUndoStack(prev => {
          const uStack = prev[activeLayerId] || [];
          const newU = [...uStack, nowSnapshot];
          if (newU.length > 30) newU.shift();
          return { ...prev, [activeLayerId]: newU };
        });

        const nextState = stack[stack.length - 1];
        setRedoStack(prev => ({ ...prev, [activeLayerId]: stack.slice(0, -1) }));

        const img = new Image();
        img.onload = () => {
            const ctx = activeCanvas.getContext('2d');
            ctx.clearRect(0, 0, activeCanvas.width, activeCanvas.height);
            ctx.drawImage(img, 0, 0);
            saveProgress('in_progress');
        };
        img.src = nextState;
      };

      const getActiveAlpha = () => {
        if (tool === 'eraser') return 1.0;
        switch (penType) {
          case 'pencil': return opacity * 0.28;
          case '4b': return opacity * 0.55;
          case 'ballpoint': return opacity * 0.95;
          case 'highlighter': return opacity * 0.5;
          case 'brush': return opacity * 0.85;
          default: return opacity * 1.0;
        }
      };

      const applyContextStyle = (tCtx, isEraserMode = false, forceSolidAlpha = false) => {
        tCtx.shadowBlur = 0; tCtx.globalAlpha = 1.0; tCtx.lineCap = 'round'; tCtx.lineJoin = 'round';
        if (isEraserMode) {
          tCtx.globalCompositeOperation = 'destination-out';
          tCtx.lineWidth = lineWidth * 5;
        } else {
          tCtx.globalCompositeOperation = 'source-over';
          tCtx.strokeStyle = color; tCtx.fillStyle = color; tCtx.lineWidth = lineWidth;
          switch (penType) {
            case 'pencil': tCtx.lineWidth = Math.max(0.7, lineWidth * 0.25); break;
            case '4b': tCtx.shadowBlur = lineWidth * 0.35; tCtx.shadowColor = color; tCtx.lineWidth = lineWidth * 0.7; break;
            case 'ballpoint': tCtx.lineWidth = Math.max(1.5, lineWidth * 0.6); break;
            case 'signpen': break;
            case 'highlighter': tCtx.lineWidth = lineWidth * 3.5; break; 
            case 'brush': tCtx.shadowBlur = lineWidth * 1.5; tCtx.shadowColor = color; break;
          }
          tCtx.globalAlpha = forceSolidAlpha ? 1.0 : getActiveAlpha();
        }
      };

      const getCoordinates = (e) => {
        const activeCanvas = canvasRefs.current[activeLayerId];
        if (!activeCanvas) return { x: 0, y: 0 };
        const rect = activeCanvas.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return { x: 0, y: 0 }; 

        const scaleX = activeCanvas.width / rect.width;
        const scaleY = activeCanvas.height / rect.height;
        const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
        const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
        
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
      };

      // 💧 [스포이드] base 캔버스와 필기 레이어를 모두 합성한 임시 캔버스에서
      // 사용자가 탭한 픽셀의 RGB를 읽어 setColor로 반영. 완전 투명이면 흰색으로 대체.
      const pickColorAt = (x, y) => {
        try {
          const w = canvasSize.w, h = canvasSize.h;
          const temp = document.createElement('canvas');
          temp.width = w; temp.height = h;
          const tCtx = temp.getContext('2d');
          tCtx.fillStyle = '#ffffff'; tCtx.fillRect(0, 0, w, h);
          // 배경(base) 캔버스는 2배 해상도이므로 축소 그리기
          const baseC = canvasRefs.current['base'];
          if (baseC) tCtx.drawImage(baseC, 0, 0, baseC.width, baseC.height, 0, 0, w, h);
          // 필기 레이어들
          layersRef.current.forEach(layer => {
            if (layer.id === 'base') return;
            if (layer.visible && canvasRefs.current[layer.id]) tCtx.drawImage(canvasRefs.current[layer.id], 0, 0, w, h);
          });
          const sx = Math.min(w - 1, Math.max(0, Math.round(x)));
          const sy = Math.min(h - 1, Math.max(0, Math.round(y)));
          const p = tCtx.getImageData(sx, sy, 1, 1).data;
          const toHex = (n) => n.toString(16).padStart(2, '0');
          const hex = `#${toHex(p[0])}${toHex(p[1])}${toHex(p[2])}`;
          setColor(hex);
          setTool('pen');
        } catch (err) {
          showAlert('안내', '색상 추출에 실패했어요. 다시 시도해주세요.');
          setTool('pen');
        }
      };

      const runFloodFill = (targetX, targetY) => {
        pushUndoState();
        const activeCanvas = canvasRefs.current[activeLayerId];
        if (!activeCanvas) return;
        const ctx = activeCanvas.getContext('2d');
        const width = activeCanvas.width; const height = activeCanvas.height;
        const imgData = ctx.getImageData(0, 0, width, height); const data = imgData.data;

        let c = color;
        if (c.length === 4) c = '#' + c[1]+c[1]+c[2]+c[2]+c[3]+c[3];
        const fillR = parseInt(c.slice(1, 3), 16);
        const fillG = parseInt(c.slice(3, 5), 16);
        const fillB = parseInt(c.slice(5, 7), 16);
        const fillA = Math.round(opacity * 255);

        const startX = Math.round(targetX); const startY = Math.round(targetY);
        if (startX < 0 || startX >= width || startY < 0 || startY >= height) return;

        const startOffset = (startY * width + startX) * 4;
        const startR = data[startOffset]; const startG = data[startOffset + 1]; const startB = data[startOffset + 2]; const startA = data[startOffset + 3];

        if (Math.abs(startR - fillR) < 5 && Math.abs(startG - fillG) < 5 && Math.abs(startB - fillB) < 5 && Math.abs(startA - fillA) < 5) return;

        const queue = [[startX, startY]];
        const visited = new Uint8Array(width * height);

        const checkMatch = (offset) => {
          return Math.abs(data[offset] - startR) < 32 && Math.abs(data[offset + 1] - startG) < 32 && Math.abs(data[offset + 2] - startB) < 32 && Math.abs(data[offset + 3] - startA) < 32;
        };

        while (queue.length > 0) {
          const [cx, cy] = queue.pop();
          const idx = cy * width + cx;
          if (visited[idx]) continue;
          visited[idx] = 1;

          const offset = idx * 4;
          if (checkMatch(offset)) {
            data[offset] = fillR; data[offset + 1] = fillG; data[offset + 2] = fillB; data[offset + 3] = fillA;
            if (cx > 0) queue.push([cx - 1, cy]);
            if (cx < width - 1) queue.push([cx + 1, cy]);
            if (cy > 0) queue.push([cx, cy - 1]);
            if (cy < height - 1) queue.push([cx, cy + 1]);
          }
        }
        ctx.putImageData(imgData, 0, 0);
        saveProgress('in_progress');
      };

      const startDrawing = (e) => {
        if (isReadOnly || activeLayerId === 'base') return;
        if (inputMode === 'pen' && e.pointerType !== 'pen') return; 
        // 🤏 핀치 줌 진행 중이면 그림 그리기 skip
        if (isMultiTouchRef.current) return;

        const { x, y } = getCoordinates(e);

        // 💧 스포이드 도구: 캔버스의 특정 픽셀 색상을 샘플링해서 현재 색상으로 설정
        if (tool === 'eyedropper') {
          pickColorAt(x, y);
          return;
        }

        if (tool === 'select') {
          if (activeSelection) return; 
          setDrawStartCoords({ x, y });
          setIsDrawing(true);
          return;
        }
        if (tool === 'text') {
          if (!activeText) setActiveText({ x, y, text: '', w: 220, h: 120, fontSize: lineWidth * 2 + 10 });
          return;
        }
        if (tool === 'paintbucket') { runFloodFill(x, y); return; }
        if (tool === 'shape') return;

        // ⏱️ [기능12] 2초 이상 꾹 누르면 캔버스에 그려진 내용을 자동으로 사각 선택해 이동 모드로 전환
        //  - 짧게 스치듯 그으면 timer는 draw() 안에서 취소되어 정상 그리기 진행
        //  - 2초 유지되면 400x400 크기 사각형이 사용자 손가락 주변에 잡혀 이동 가능
        if (tool === 'pen' || tool === 'eraser' || tool === 'line' || tool === 'curve' || tool === 'wave') {
          longPressPosRef.current = { x, y };
          if (longPressTimerRef.current) { clearTimeout(longPressTimerRef.current); longPressTimerRef.current = null; }
          longPressTimerRef.current = setTimeout(() => {
            longPressTimerRef.current = null;
            setIsDrawing(false);
            const activeCanvas = canvasRefs.current[activeLayerId];
            if (!activeCanvas) return;
            const lCtx = activeCanvas.getContext('2d');
            const rectW = 400, rectH = 400;
            const cx = longPressPosRef.current.x, cy = longPressPosRef.current.y;
            const rectX = Math.max(0, cx - rectW / 2);
            const rectY = Math.max(0, cy - rectH / 2);
            const w = Math.min(rectW, activeCanvas.width - rectX);
            const h = Math.min(rectH, activeCanvas.height - rectY);
            if (w <= 0 || h <= 0) return;
            try {
              pushUndoState();
              const tempCanvas = document.createElement('canvas');
              tempCanvas.width = w; tempCanvas.height = h;
              tempCanvas.getContext('2d').putImageData(lCtx.getImageData(rectX, rectY, w, h), 0, 0);
              lCtx.clearRect(rectX, rectY, w, h);
              setActiveSelection({ x: rectX, y: rectY, w: w, h: h, dataUrl: tempCanvas.toDataURL() });
              setTool('select');
            } catch (err) { console.error(err); }
          }, 2000);
        }

        pushUndoState();
        setDrawStartCoords({ x, y });
        setIsDrawing(true);
        
        lastPosRef.current = { x, y };

        if (tool === 'pen') {
          const pCtx = previewCanvasRef.current.getContext('2d');
          pCtx.clearRect(0, 0, canvasSize.w, canvasSize.h);
          
          applyContextStyle(pCtx, false, true);
          pCtx.beginPath();
          pCtx.moveTo(x, y);
          pCtx.lineTo(x, y + 0.1); 
          pCtx.stroke();
        } else if (tool === 'eraser') {
          // 🧽 [기능3 수정] 지우개가 한 번 탭만 해도 확실히 지워지도록 즉시 원 형태로 지움
          const lCtx = canvasRefs.current[activeLayerId].getContext('2d');
          applyContextStyle(lCtx, true, false);
          lCtx.beginPath();
          lCtx.arc(x, y, lineWidth * 2.5, 0, Math.PI * 2);
          lCtx.fill();
          lCtx.beginPath();
          lCtx.moveTo(x, y);
        }
      };

      const draw = (e) => {
        // ⏱️ [기능12] 손가락이 이동하면 롱프레스 타이머 취소 → 정상 그리기 계속
        if (longPressTimerRef.current) {
          const { x: lx, y: ly } = getCoordinates(e);
          const dx = lx - longPressPosRef.current.x;
          const dy = ly - longPressPosRef.current.y;
          if (Math.hypot(dx, dy) > 8) { clearTimeout(longPressTimerRef.current); longPressTimerRef.current = null; }
        }
        if (!isDrawing || tool === 'shape' || tool === 'paintbucket' || tool === 'text' || isReadOnly || activeLayerId === 'base') return;
        if (inputMode === 'pen' && e.pointerType !== 'pen') return; 

        const activeCanvas = canvasRefs.current[activeLayerId];
        const previewCanvas = previewCanvasRef.current;
        if (!activeCanvas || !previewCanvas) return;

        const { x, y } = getCoordinates(e);

        if (tool === 'select') {
           const pCtx = previewCanvas.getContext('2d');
           pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
           pCtx.setLineDash([6, 6]);
           pCtx.strokeStyle = '#3b82f6'; 
           pCtx.lineWidth = 3;
           pCtx.strokeRect(drawStartCoords.x, drawStartCoords.y, x - drawStartCoords.x, y - drawStartCoords.y);
           pCtx.setLineDash([]);
           return;
        }

        if (tool === 'pen') {
          const pCtx = previewCanvas.getContext('2d');
          applyContextStyle(pCtx, false, true); 
          
          if (e.pointerType === 'pen' && e.pressure) {
              pCtx.lineWidth = pCtx.lineWidth * (0.5 + e.pressure);
          }
          pCtx.beginPath();
          pCtx.moveTo(lastPosRef.current.x, lastPosRef.current.y);
          pCtx.lineTo(x, y);
          pCtx.stroke();
          lastPosRef.current = { x, y };

        } else if (tool === 'eraser') {
          // 🧽 [기능3 수정] 이동 경로마다 원을 찍고 선도 그려 확실히 지우기
          const lCtx = activeCanvas.getContext('2d');
          lCtx.lineTo(x, y);
          lCtx.stroke();
          // 원 스탬프도 추가 → 빠른 이동 시 사이 간격도 확실히 지움
          lCtx.beginPath();
          lCtx.arc(x, y, lineWidth * 2.5, 0, Math.PI * 2);
          lCtx.fill();
          lCtx.beginPath();
          lCtx.moveTo(x, y);
        }
        else if (tool === 'line' || tool === 'curve' || tool === 'wave') {
          const pCtx = previewCanvas.getContext('2d');
          pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
          applyContextStyle(pCtx, false);
          const sX = drawStartCoords.x; const sY = drawStartCoords.y;

          if (tool === 'line') { pCtx.beginPath(); pCtx.moveTo(sX, sY); pCtx.lineTo(x, y); pCtx.stroke(); } 
          else if (tool === 'curve') {
            const midX = (sX + x) / 2; const midY = (sY + y) / 2;
            pCtx.beginPath(); pCtx.moveTo(sX, sY); pCtx.quadraticCurveTo(midX - (y - sY) * 0.18, midY + (x - sX) * 0.18, x, y); pCtx.stroke();
          } 
          else if (tool === 'wave') {
            const dx = x - sX; const dy = y - sY; const len = Math.sqrt(dx * dx + dy * dy); const angle = Math.atan2(dy, dx);
            pCtx.save(); pCtx.translate(sX, sY); pCtx.rotate(angle); pCtx.beginPath();
            for (let ix = 0; ix <= len; ix++) {
              const iy = Math.sin(ix * 0.08) * 8;
              if (ix === 0) pCtx.moveTo(ix, iy); else pCtx.lineTo(ix, iy);
            }
            pCtx.stroke(); pCtx.restore();
          }
        }
      };

      const stopDrawing = (e) => {
        // ⏱️ [기능12] 손을 떼면 롱프레스 타이머 취소
        if (longPressTimerRef.current) { clearTimeout(longPressTimerRef.current); longPressTimerRef.current = null; }
        if (!isDrawing) return;
        setIsDrawing(false);

        const activeCanvas = canvasRefs.current[activeLayerId];
        const previewCanvas = previewCanvasRef.current;
        if (!activeCanvas || !previewCanvas) return;

        const { x, y } = getCoordinates(e);

        if (tool === 'select') {
            const endX = x; const endY = y;
            const sX = drawStartCoords.x; const sY = drawStartCoords.y;
            const rectX = Math.min(sX, endX); const rectY = Math.min(sY, endY);
            const rectW = Math.abs(endX - sX); const rectH = Math.abs(endY - sY);

            if (rectW > 10 && rectH > 10) {
                pushUndoState();
                const lCtx = activeCanvas.getContext('2d');
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = rectW; tempCanvas.height = rectH;
                const tCtx = tempCanvas.getContext('2d');
                
                tCtx.putImageData(lCtx.getImageData(rectX, rectY, rectW, rectH), 0, 0);
                setActiveSelection({ x: rectX, y: rectY, w: rectW, h: rectH, dataUrl: tempCanvas.toDataURL() });

                lCtx.clearRect(rectX, rectY, rectW, rectH);
            }
            previewCanvas.getContext('2d').clearRect(0,0, previewCanvas.width, previewCanvas.height);
            return;
        }

        if (tool === 'pen') { 
            const lCtx = activeCanvas.getContext('2d');
            lCtx.save();
            lCtx.globalAlpha = getActiveAlpha();
            lCtx.globalCompositeOperation = 'source-over';
            lCtx.drawImage(previewCanvas, 0, 0);
            lCtx.restore();
            
            previewCanvas.getContext('2d').clearRect(0, 0, previewCanvas.width, previewCanvas.height);
        } 
        else if (tool === 'eraser') { activeCanvas.getContext('2d').closePath(); } 
        else if (tool === 'line' || tool === 'curve' || tool === 'wave') {
          const lCtx = activeCanvas.getContext('2d');
          const pCtx = previewCanvas.getContext('2d');
          pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
          applyContextStyle(lCtx, false);
          const sX = drawStartCoords.x; const sY = drawStartCoords.y;

          if (tool === 'line') { lCtx.beginPath(); lCtx.moveTo(sX, sY); lCtx.lineTo(x, y); lCtx.stroke(); } 
          else if (tool === 'curve') {
            const midX = (sX + x) / 2; const midY = (sY + y) / 2;
            lCtx.beginPath(); lCtx.moveTo(sX, sY); lCtx.quadraticCurveTo(midX - (y - sY) * 0.18, midY + (x - sX) * 0.18, x, y); lCtx.stroke();
          } 
          else if (tool === 'wave') {
            const dx = x - sX; const dy = y - sY; const len = Math.sqrt(dx * dx + dy * dy); const angle = Math.atan2(dy, dx);
            lCtx.save(); lCtx.translate(sX, sY); lCtx.rotate(angle); lCtx.beginPath();
            for (let ix = 0; ix <= len; ix++) {
              const iy = Math.sin(ix * 0.08) * 8;
              if (ix === 0) lCtx.moveTo(ix, iy); else lCtx.lineTo(ix, iy);
            }
            lCtx.stroke(); lCtx.restore();
          }
        }
        saveProgress('in_progress');
      };

      const handleClearTrigger = () => {
        showConfirm('도화지 깨끗하게 지우기 🧽', `현재 [Page ${currentPageIndex + 1}]에 그린 그림과 글씨를 모두 깨끗하게 지울까요?`, () => {
          pushUndoState();
          layersRef.current.forEach(layer => {
            if (layer.id === 'base') return;
            const canvas = canvasRefs.current[layer.id];
            if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
          });
          setTool('pen');
          saveProgressWithLayers(layersRef.current, 'in_progress');
        });
      };

      // 🚀 [기능13 수정] 제출·자동저장 안정성 개선
      //  - 이전에는 PNG 원본을 그대로 저장해 Firestore 1MB 문서 한계를 초과 → 제출이 무한 대기
      //  - 이번엔 JPEG(0.8 품질)로 압축하고 실패 시 사용자에게 명확히 안내함
      //  - "슈웅 날아가는 중"이 영원히 남지 않도록 8초 안전 타임아웃 추가
      const saveProgressWithLayers = async (targetLayers, status = 'in_progress') => {
        if (isReadOnly) return;
        if (status === 'submitted') setIsSubmitting(true);
        // 최대 15초 안전 타임아웃 - 예기치 못한 상황에서도 버튼이 복구되도록
        const safetyTimer = setTimeout(() => setIsSubmitting(false), 15000);

        try {
          const compositeCanvas = document.createElement('canvas');
          compositeCanvas.width = canvasSize.w; compositeCanvas.height = canvasSize.h;
          const compCtx = compositeCanvas.getContext('2d');

          // 제출 시엔 학습지 배경을 흰색으로 채워 배경까지 포함해 JPEG로 압축 저장
          // 자동저장은 필기만 담긴 투명 PNG(재제출 편집 호환) → 단, 실패 방지를 위해 JPEG로도 저장 시도
          targetLayers.forEach(layer => {
            if (layer.id === 'base') return;
            if (layer.visible && canvasRefs.current[layer.id]) compCtx.drawImage(canvasRefs.current[layer.id], 0, 0);
          });

          // 🎯 재제출/편집 호환을 위해 필기 원본은 투명 PNG로도 필요 → 크기 확인 후 자동 선택
          let dataUrl = compositeCanvas.toDataURL('image/png');
          // Firestore 1MB(약 1,048,576 char base64) 한계를 감안해 700KB 이상이면 JPEG로 다운스케일
          if (dataUrl.length > 700000) {
            // 흰 배경 위에 필기를 얹은 뒤 JPEG로 재-저장 (재편집은 어렵지만 제출은 확실)
            const jpegCanvas = document.createElement('canvas');
            jpegCanvas.width = canvasSize.w; jpegCanvas.height = canvasSize.h;
            const jctx = jpegCanvas.getContext('2d');
            jctx.fillStyle = '#ffffff'; jctx.fillRect(0, 0, canvasSize.w, canvasSize.h);
            jctx.drawImage(compositeCanvas, 0, 0);
            dataUrl = jpegCanvas.toDataURL('image/jpeg', 0.8);
          }

          const updatedPages = [...pages];
          updatedPages[currentPageIndex] = dataUrl;
          setPages(updatedPages);

          const subData = {
            assignmentId: assignment.id, studentId: student.id, studentName: student.name, status: status,
            drawingData: updatedPages[0], pagesData: updatedPages, updatedAt: Date.now(),
            studentRefImageUrl: studentRefImageUrlRef.current, studentRefVideoUrl: studentRefVideoUrlRef.current,
            studentRefLinkUrl: studentRefLinkUrlRef.current, studentFileType: studentFileTypeRef.current, studentFileName: studentFileNameRef.current,
            // 🖼️ [기능7] 연습장 배경 사진도 저장 → 다시 열 때 배경 복구
            practiceBgImages: practiceBgImagesRef.current || []
          };

          const subId = currentSubmissionIdRef.current;
          if (subId) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', subId), subData); }
          else {
            const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'), subData);
            setCurrentSubmissionId(docRef.id);
          }
          if (status === 'submitted') { showAlert('제출 성공 🎉', '선생님께 과제 제출이 완료되었어요! 수고했어요!'); onClose(); }
        } catch (e) {
          console.error(e);
          if (status === 'submitted') showAlert('앗!', '제출하는 도중 문제가 생겼어요. 페이지 수를 줄이거나 다시 시도해주세요.');
        } finally {
          clearTimeout(safetyTimer);
          setIsSubmitting(false);
        }
      };

      const saveProgress = (status = 'in_progress') => saveProgressWithLayers(layersRef.current, status);

      const handleStudentImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          // 용량 최적화 압축 업로드 적용
          compressImage(URL.createObjectURL(file), (compressedUrl) => setStudentRefImageUrl(compressedUrl));
        }
      };

      const handleShapeSelect = (type) => {
          setTool('shape');
          setActiveShape({ type, x: canvasSize.w / 2 - 100, y: canvasSize.h / 2 - 100, w: 200, h: 200 });
          if (window.innerWidth < 768) setIsToolbarOpen(false);
      };

      const stampShape = () => {
          const activeCanvas = canvasRefs.current[activeLayerId];
          if (!activeCanvas || !activeShape) return;
          pushUndoState();
          const lCtx = activeCanvas.getContext('2d');

          lCtx.save(); lCtx.globalCompositeOperation = 'source-over'; lCtx.strokeStyle = color; lCtx.fillStyle = color; lCtx.lineWidth = lineWidth; lCtx.lineCap = 'round'; lCtx.lineJoin = 'round'; lCtx.shadowBlur = 0; lCtx.globalAlpha = opacity; 
          
          lCtx.beginPath();
          const { x, y, w, h, type } = activeShape;
          
          if (type === 'rect') { lCtx.rect(x, y, w, h); } 
          else if (type === 'circle') { lCtx.ellipse(x + w/2, y + h/2, Math.max(w/2, 0.1), Math.max(h/2, 0.1), 0, 0, Math.PI*2); } 
          else if (type === 'triangle') { lCtx.moveTo(x + w/2, y); lCtx.lineTo(x + w, y + h); lCtx.lineTo(x, y + h); lCtx.closePath(); }

          if (fillShape) lCtx.fill();
          lCtx.stroke(); lCtx.restore();
          
          setActiveShape(null); setTool('pen'); saveProgress('in_progress');
      };

      const zoomIn = () => setZoomScale(prev => Math.min(prev + 0.15, 3.0));
      const zoomOut = () => setZoomScale(prev => Math.max(prev - 0.15, 0.5));
      const resetZoom = () => setZoomScale(1.0);
      const fitWidth = () => {
        const container = containerRef.current;
        if (!container) return;
        setZoomScale(Math.min((container.clientWidth - 32) / canvasSize.w, 2.5));
      };

      // 🤏 [핀치 줌] 두 손가락 오므리면 축소, 벌리면 확대. 두 손가락 이상이 닿았을 때는
      // isMultiTouchRef를 true로 만들어 startDrawing에서 그림 그리기를 skip → 핀치 중 오작동 방지.
      // zoomScale은 ref로 읽어 effect 재등록을 피함.
      const isMultiTouchRef = useRef(false);
      const zoomScaleRef = useRef(zoomScale);
      useEffect(() => { zoomScaleRef.current = zoomScale; }, [zoomScale]);
      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;

        let pinchStartDist = 0;
        let pinchStartScale = 1;
        let isPinching = false;

        const getDist = (touches) => {
          const dx = touches[0].clientX - touches[1].clientX;
          const dy = touches[0].clientY - touches[1].clientY;
          return Math.hypot(dx, dy);
        };

        const onTouchStart = (e) => {
          if (e.touches.length >= 2) {
            isMultiTouchRef.current = true;
            isPinching = true;
            pinchStartDist = getDist(e.touches);
            pinchStartScale = zoomScaleRef.current;
            // 진행 중이던 그리기를 즉시 중단
            setIsDrawing(false);
            e.preventDefault();
          }
        };
        const onTouchMove = (e) => {
          if (isPinching && e.touches.length >= 2) {
            const d = getDist(e.touches);
            if (pinchStartDist > 0) {
              const ratio = d / pinchStartDist;
              const next = Math.max(0.5, Math.min(3.0, pinchStartScale * ratio));
              setZoomScale(next);
            }
            e.preventDefault();
          }
        };
        const onTouchEnd = (e) => {
          if (e.touches.length < 2) {
            isPinching = false;
            // 마지막 손가락까지 떨어지면 멀티터치 상태 해제
            if (e.touches.length === 0) isMultiTouchRef.current = false;
          }
        };

        container.addEventListener('touchstart', onTouchStart, { passive: false });
        container.addEventListener('touchmove', onTouchMove, { passive: false });
        container.addEventListener('touchend', onTouchEnd);
        container.addEventListener('touchcancel', onTouchEnd);
        return () => {
          container.removeEventListener('touchstart', onTouchStart);
          container.removeEventListener('touchmove', onTouchMove);
          container.removeEventListener('touchend', onTouchEnd);
          container.removeEventListener('touchcancel', onTouchEnd);
        };
      }, []);

      const handleCloseTrigger = async () => { 
        setIsSubmitting(true);
        await saveProgress('in_progress'); 
        onClose(); 
      };

      const hasRefMaterials = assignment.refImageUrl || assignment.refVideoUrl || assignment.refLinkUrl || assignment.teacherAttachment;
      const isLineToolActive = tool === 'line' || tool === 'curve' || tool === 'wave';

      return (
        <div className="flex-1 w-full h-full relative overflow-hidden bg-slate-200/50 flex flex-col" ref={containerRef}>
          
          {/* 1. TOP OVERLAY : Header & Submit Button */}
          <div className="absolute top-0 left-0 right-0 p-5 flex justify-between items-start z-[60] pointer-events-none">
            <div className="flex flex-col gap-3 pointer-events-auto">
                {assignment.isPractice ? (
                  <button onClick={handleCloseTrigger} className="px-5 py-3 bg-white hover:bg-slate-50 text-indigo-600 font-black rounded-3xl shadow-xl flex items-center gap-2 border-4 border-indigo-100 text-sm transition-all hover:-translate-y-1">
                      ← 닫기 (자동 저장)
                  </button>
                ) : (
                  <button onClick={handleCloseTrigger} className="px-5 py-3 bg-white hover:bg-slate-50 text-slate-700 font-black rounded-3xl shadow-xl flex items-center gap-2 border-4 border-white text-sm transition-all hover:-translate-y-1">
                      ← 나중에 이어서 하기
                  </button>
                )}
                <div className="flex gap-2">
                  <button onClick={() => setIsToolbarOpen(!isToolbarOpen)} className="px-4 py-3 bg-indigo-500 hover:bg-indigo-600 text-white rounded-2xl shadow-xl flex items-center gap-2 font-black text-sm transition-all hover:scale-105 border-b-4 border-indigo-700">
                      {isToolbarOpen ? <X size={18}/> : <Menu size={18}/>}
                      {isToolbarOpen ? '숨기기' : '도구상자'}
                  </button>
                  {hasRefMaterials && (
                    <button onClick={() => setIsRefOpen(!isRefOpen)} className={`px-4 py-3 rounded-2xl shadow-xl flex items-center gap-2 font-black text-sm transition-all hover:scale-105 border-b-4 ${isRefOpen ? 'bg-amber-400 text-white border-amber-500' : 'bg-white text-slate-700 border-slate-200'}`}>
                      <Lightbulb size={18} className={isRefOpen ? "animate-bounce text-white" : "text-amber-500"}/> 힌트 보기
                    </button>
                  )}
                </div>
            </div>

            <div className="flex flex-col items-end gap-3 pointer-events-auto">
                {!isReadOnly && (
                    <div className="px-4 py-2 bg-white/80 backdrop-blur-md rounded-full text-indigo-600 font-black text-xs shadow-sm border border-white animate-pulse">
                        ✨ 스윽삭 자동으로 저장되는 중...
                    </div>
                )}
                <div className="flex gap-2">
                    {!isReadOnly && !assignment.isPractice && (
                        <button onClick={() => setIsAttachModalOpen(true)} className="px-5 py-3.5 bg-white text-teal-600 hover:bg-teal-50 font-black rounded-3xl shadow-xl flex items-center gap-2 transition-all text-sm border-4 border-teal-100 hover:-translate-y-1">
                          <Paperclip size={18} /> 자료 첨부하기 📎
                          {(studentRefImageUrl || studentRefVideoUrl || studentRefLinkUrl || studentFileType !== 'none') && (
                            <span className="w-3 h-3 bg-rose-500 rounded-full animate-ping shadow-sm"></span>
                          )}
                        </button>
                    )}
                    {!isReadOnly ? (
                        assignment.isPractice ? (
                          <div className="flex gap-2 items-center">
                            <div className="px-4 py-3.5 bg-gradient-to-r from-amber-400 to-orange-400 text-white font-black rounded-3xl shadow-xl flex items-center gap-2 text-sm border-2 border-white shadow-amber-200">
                              📒 연습장 모드
                            </div>
                            <button onClick={openPracticeSubmitModal} className="px-5 py-3.5 bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-600 hover:to-emerald-600 text-white font-black rounded-3xl shadow-xl flex items-center gap-2 text-sm border-2 border-white shadow-teal-200 hover:-translate-y-1 transition-all">
                              <Send size={16} strokeWidth={3}/> 선생님께 제출 📤
                            </button>
                          </div>
                        ) : (
                          <div className="flex gap-2 items-center">
                            {/* 📤 [기능-부분제출] 부분 제출 허용 과제인 경우, 페이지 선택 제출 버튼 노출 */}
                            {assignment.allowPartialSubmit && (
                              <button onClick={openPartialSubmitModal} className="px-5 py-3.5 bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-600 hover:to-cyan-600 text-white font-black rounded-3xl shadow-xl flex items-center gap-2 text-sm border-2 border-white shadow-teal-200 hover:-translate-y-1 transition-all" title="원하는 페이지만 골라서 제출">
                                <FileText size={16} strokeWidth={3}/> 부분 제출 📑
                              </button>
                            )}
                            <button onClick={() => saveProgress('submitted')} disabled={isSubmitting} className="px-6 py-3.5 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-black rounded-3xl shadow-xl flex items-center gap-2 text-sm transition-all disabled:opacity-50 border-2 border-white shadow-indigo-200 hover:-translate-y-1">
                              {isSubmitting ? '슈웅 날아가는 중 🚀' : <><Send size={18} /> 선생님께 제출하기 💯</>}
                            </button>

             {/* Scalable Absolute Stack Canvas wrapper

             <div

                          canvasRefs.current[layer.id] = el;

                      onPointerDown={layer.id === activeLayerId ? startDrawing : null}
                      onPointerMove={layer.id === activeLayerId ? draw : null}
                      onPointerUp={layer.id === activeLayerId ? stopDrawing : null}

                {/* ✂️ 손바닥(올가미) 도구 에디터 오버레이 (선택 영역 이동) */}
                {activeSelection && tool === 'select' && (

                              e.stopPropagation();
                              isDraggingOverlayRef.current = true; /* 🩹 화면 스크롤 방지 */
                              const canvasRect = canvasRefs.current[activeLayerId].getBoundingClientRect();
                              const startX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                              const startY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                              const initX = activeSelection.x; const initY = activeSelection.y;
                              const onMove = (moveEv) => {
                                  const scaleX = canvasRefs.current[activeLayerId].width / canvasRect.width;
                                  const scaleY = canvasRefs.current[activeLayerId].height / canvasRect.height;
                                  const clientX = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientX : moveEv.clientX;
                                  const clientY = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientY : moveEv.clientY;
                                  setActiveSelection(prev => ({ ...prev, x: initX + (clientX - startX) * scaleX, y: initY + (clientY - startY) * scaleY }));
                              };
                              const onUp = () => { isDraggingOverlayRef.current = false; window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
                              window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
                              window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
                          }}
                       />
                       <div className="absolute -bottom-14 left-1/2 -translate-x-1/2 flex gap-2">
                           <button onClick={(e)=>{e.stopPropagation(); setActiveSelection(null); setTool('pen'); saveProgress('in_progress');}} className="w-10 h-10 bg-rose-500 rounded-full text-white flex items-center justify-center shadow-lg hover:bg-rose-600 transition-all border-2 border-white" title="이 영역 삭제하기"><Trash2 size={16}/></button>
                           <button onClick={(e)=>{
                               e.stopPropagation();
                               const activeCanvas = canvasRefs.current[activeLayerId];
                               if (!activeCanvas) return;
                               const lCtx = activeCanvas.getContext('2d');
                               const img = new Image();
                               img.onload = () => {
                                   lCtx.globalAlpha = 1.0;
                                   lCtx.drawImage(img, activeSelection.x, activeSelection.y, activeSelection.w, activeSelection.h);
                                   setActiveSelection(null);
                                   setTool('pen');
                                   saveProgress('in_progress');
                               };
                               img.src = activeSelection.dataUrl;
                           }} className="px-4 h-10 bg-indigo-500 rounded-full font-black text-white flex items-center justify-center shadow-lg hover:bg-indigo-600 transition-all border-2 border-white whitespace-nowrap"><Check size={18} strokeWidth={3}/> 이동 완료</button>
                       </div>
                   </div>
                )}

                {/* 🔤 텍스트 에디터 오버레이 */}
                {activeText && tool === 'text' && (
                   <div className="absolute z-50 flex flex-col border-4 border-amber-400 border-dashed rounded-3xl bg-amber-50/40 p-1"
                        style={{ left: activeText.x, top: activeText.y, width: activeText.w, height: activeText.h }}
                        onTouchStart={(e) => { /* 🩹 [기능4,5] 두 손가락(핀치)으로 텍스트 상자 크기 조절 + 화면 스크롤 방지 */
                            if (e.touches.length >= 2) {
                                e.stopPropagation();
                                e.preventDefault();
                                isDraggingOverlayRef.current = true;
                                const dx0 = e.touches[0].clientX - e.touches[1].clientX;
                                const dy0 = e.touches[0].clientY - e.touches[1].clientY;
                                const startDist = Math.hypot(dx0, dy0);
                                const initW = activeText.w, initH = activeText.h, initFS = activeText.fontSize;
                                const onMove = (ev) => {
                                    if (ev.touches.length < 2) return;
                                    ev.preventDefault();
                                    const dx = ev.touches[0].clientX - ev.touches[1].clientX;
                                    const dy = ev.touches[0].clientY - ev.touches[1].clientY;
                                    const d = Math.hypot(dx, dy);
                                    const ratio = startDist > 0 ? d / startDist : 1;
                                    setActiveText(prev => ({
                                        ...prev,
                                        w: Math.max(80, initW * ratio),
                                        h: Math.max(50, initH * ratio),
                                        fontSize: Math.max(10, Math.min(200, initFS * ratio))
                                    }));
                                };
                                const onEnd = () => {
                                    isDraggingOverlayRef.current = false;
                                    window.removeEventListener('touchmove', onMove);
                                    window.removeEventListener('touchend', onEnd);
                                    window.removeEventListener('touchcancel', onEnd);
                                };
                                window.addEventListener('touchmove', onMove, { passive: false });
                                window.addEventListener('touchend', onEnd);
                                window.addEventListener('touchcancel', onEnd);
                            }
                        }}
                        onPointerDown={(e) => e.stopPropagation()}
                   >
                      <div className="absolute -top-10 left-1/2 -translate-x-1/2 bg-amber-500 text-white text-[11px] px-4 py-1.5 rounded-full cursor-move shadow-lg flex items-center gap-1.5 font-black whitespace-nowrap touch-none"
                         onPointerDown={(e) => {
                             e.stopPropagation();
                             isDraggingOverlayRef.current = true; /* 🩹 [기능5] 화면 스크롤 방지 */
                             const canvasRect = canvasRefs.current[activeLayerId].getBoundingClientRect();
                             const startX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                             const startY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                             const initX = activeText.x; const initY = activeText.y;
                             const onMove = (moveEv) => {
                                 if (moveEv.preventDefault) moveEv.preventDefault();
                                 const scaleX = canvasRefs.current[activeLayerId].width / canvasRect.width;
                                 const scaleY = canvasRefs.current[activeLayerId].height / canvasRect.height;
                                 const clientX = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientX : moveEv.clientX;
                                 const clientY = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientY : moveEv.clientY;
                                 setActiveText(prev => ({ ...prev, x: initX + (clientX - startX) * scaleX, y: initY + (clientY - startY) * scaleY }));
                             };
                             const onUp = () => { isDraggingOverlayRef.current = false; window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
                             window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
                             window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
                         }}
                      >
                         <Maximize2 size={12}/> 드래그해서 이동
                      </div>

                      <textarea
                         autoFocus
                         value={activeText.text}
                         onChange={(e) => setActiveText(prev => ({...prev, text: e.target.value}))}

                         className="custom-scrollbar"
                         style={{
                             fontFamily: fontFamily, fontSize: `${activeText.fontSize}px`, color: color,
                             fontWeight: textStyle.bold ? '900' : '400', fontStyle: textStyle.italic ? 'italic' : 'normal',
                             textDecoration: `${textStyle.underline ? 'underline' : ''} ${textStyle.strike ? 'line-through' : ''}`.trim(),
                             opacity: opacity, background: 'transparent', border: 'none', outline: 'none',
                             width: '100%', height: '100%', resize: 'none',
                             lineHeight: 1.4, overflow: 'auto', padding: '12px'
                         }}
                      />

                      {/* 🩹 [기능4] 대각선(우하단) 리사이즈 핸들 - S펜/터치 모두 지원 */}
                      <div className="absolute -right-3 -bottom-3 w-8 h-8 bg-amber-500 rounded-full cursor-nwse-resize shadow-lg flex items-center justify-center text-white border-2 border-white touch-none"
                         onPointerDown={(e) => {
                             e.stopPropagation();
                             isDraggingOverlayRef.current = true;
                             const startX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                             const startY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                             const initW = activeText.w, initH = activeText.h, initFS = activeText.fontSize;
                             const onMove = (moveEv) => {
                                 if (moveEv.preventDefault) moveEv.preventDefault();
                                 const clientX = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientX : moveEv.clientX;
                                 const clientY = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientY : moveEv.clientY;
                                 const dW = clientX - startX;
                                 const dH = clientY - startY;
                                 const newW = Math.max(80, initW + dW);
                                 const newH = Math.max(50, initH + dH);
                                 // 대각선 리사이즈: 크기 비율에 맞춰 폰트 크기도 부드럽게 확대/축소
                                 const ratio = Math.min(newW / initW, newH / initH);
                                 setActiveText(prev => ({ ...prev, w: newW, h: newH, fontSize: Math.max(10, Math.min(200, initFS * ratio)) }));
                             };
                             const onUp = () => { isDraggingOverlayRef.current = false; window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
                             window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
                             window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
                         }}
                      ><Maximize2 size={14}/></div>

                      {/* 🩹 [기능4] 가로 리사이즈 핸들 (오른쪽 중앙) - 너비만 변경 */}
                      <div className="absolute -right-2 top-1/2 -translate-y-1/2 w-5 h-10 bg-amber-400 rounded-full cursor-ew-resize shadow border-2 border-white touch-none"
                         onPointerDown={(e) => {
                             e.stopPropagation();
                             isDraggingOverlayRef.current = true;
                             const startX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                             const initW = activeText.w;
                             const onMove = (moveEv) => {
                                 if (moveEv.preventDefault) moveEv.preventDefault();
                                 const clientX = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientX : moveEv.clientX;
                                 setActiveText(prev => ({ ...prev, w: Math.max(80, initW + (clientX - startX)) }));
                             };
                             const onUp = () => { isDraggingOverlayRef.current = false; window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
                             window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
                             window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
                         }}
                      />

                      {/* 🩹 [기능4] 세로 리사이즈 핸들 (하단 중앙) - 높이만 변경 */}
                      <div className="absolute -bottom-2 left-1/2 -translate-x-1/2 w-10 h-5 bg-amber-400 rounded-full cursor-ns-resize shadow border-2 border-white touch-none"
                         onPointerDown={(e) => {
                             e.stopPropagation();
                             isDraggingOverlayRef.current = true;
                             const startY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                             const initH = activeText.h;
                             const onMove = (moveEv) => {
                                 if (moveEv.preventDefault) moveEv.preventDefault();
                                 const clientY = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientY : moveEv.clientY;
                                 setActiveText(prev => ({ ...prev, h: Math.max(50, initH + (clientY - startY)) }));
                             };
                             const onUp = () => { isDraggingOverlayRef.current = false; window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
                             window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
                             window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
                         }}
                      />

                      <div className="absolute -bottom-14 left-1/2 -translate-x-1/2 flex gap-3">
                         <button onClick={() => setActiveText(null)} className="w-12 h-12 bg-rose-500 rounded-full text-white flex items-center justify-center shadow-lg hover:bg-rose-600 hover:-translate-y-1 transition-all border-4 border-white"><Trash2 size={20}/></button>
                         <button onClick={() => {
                            const activeCanvas = canvasRefs.current[activeLayerId];
                            if (!activeCanvas) return;
                            pushUndoState(); 
                            const lCtx = activeCanvas.getContext('2d');
                            lCtx.save(); lCtx.globalCompositeOperation = 'source-over'; lCtx.globalAlpha = opacity; lCtx.fillStyle = color; lCtx.textBaseline = 'top';

                            const fontSize = activeText.fontSize;
                            lCtx.font = `${textStyle.italic ? 'italic' : 'normal'} ${textStyle.bold ? '900' : '400'} ${fontSize}px ${fontFamily}`;

                            const lines = activeText.text.split('\n');
                            const lineHeight = fontSize * 1.4; 
                            const paddingOffset = 12;
                            const startX = activeText.x + paddingOffset;
                            let currentY = activeText.y + paddingOffset;

                            lines.forEach((line) => {
                                lCtx.fillText(line, startX, currentY);
                                const textWidth = lCtx.measureText(line).width;
                                lCtx.strokeStyle = color; lCtx.lineWidth = Math.max(1.5, fontSize * 0.08); lCtx.lineCap = 'butt';
                                if (textStyle.underline) { lCtx.beginPath(); lCtx.moveTo(startX, currentY + fontSize * 1.15); lCtx.lineTo(startX + textWidth, currentY + fontSize * 1.15); lCtx.stroke(); }
                                if (textStyle.strike) { lCtx.beginPath(); lCtx.moveTo(startX, currentY + fontSize * 0.55); lCtx.lineTo(startX + textWidth, currentY + fontSize * 0.55); lCtx.stroke(); }
                                currentY += lineHeight;
                            });
                            lCtx.restore(); setActiveText(null); saveProgress('in_progress');
                         }} className="px-6 h-12 bg-emerald-500 rounded-full font-black text-white flex items-center justify-center shadow-lg hover:bg-emerald-600 hover:-translate-y-1 transition-all border-4 border-white gap-1 whitespace-nowrap"><Check size={20} strokeWidth={3}/> 글씨 꾹 찍기!</button>
                      </div>
                   </div>
                )}

                {/* Shape Overlay Editor */}
                {activeShape && tool === 'shape' && (
                   <div 
                      className="absolute border-4 border-indigo-400 border-dashed z-50 bg-indigo-500/10 touch-none flex items-center justify-center group rounded-3xl"
                      style={{ left: activeShape.x, top: activeShape.y, width: activeShape.w, height: activeShape.h }}
                   >
                       <svg width="100%" height="100%" style={{ pointerEvents: 'none' }}>
                          {activeShape.type === 'rect' && <rect x="0" y="0" width="100%" height="100%" fill={fillShape ? color : 'none'} fillOpacity={fillShape ? opacity : 1} stroke={color} strokeWidth={lineWidth} strokeOpacity={opacity} rx={16} ry={16} />}
                          {activeShape.type === 'circle' && <ellipse cx="50%" cy="50%" rx="50%" ry="50%" fill={fillShape ? color : 'none'} fillOpacity={fillShape ? opacity : 1} stroke={color} strokeWidth={lineWidth} strokeOpacity={opacity} />}
                          {activeShape.type === 'triangle' && <polygon points={`50%,0 100%,100% 0,100%`} fill={fillShape ? color : 'none'} fillOpacity={fillShape ? opacity : 1} stroke={color} strokeWidth={lineWidth} strokeOpacity={opacity} strokeLinejoin="round" />}
                       </svg>
                       
                       <div className="absolute inset-0 cursor-move"
                          onPointerDown={(e) => {
                              e.stopPropagation();
                              isDraggingOverlayRef.current = true; /* 🩹 화면 스크롤 방지 */
                              const canvasRect = canvasRefs.current[activeLayerId].getBoundingClientRect();
                              const startX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                              const startY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                              const initX = activeShape.x; const initY = activeShape.y;
                              const onMove = (moveEv) => {
                                  const scaleX = canvasRefs.current[activeLayerId].width / canvasRect.width;
                                  const scaleY = canvasRefs.current[activeLayerId].height / canvasRect.height;
                                  const clientX = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientX : moveEv.clientX;
                                  const clientY = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientY : moveEv.clientY;
                                  setActiveShape(prev => ({ ...prev, x: initX + (clientX - startX) * scaleX, y: initY + (clientY - startY) * scaleY }));
                              };
                              const onUp = () => { isDraggingOverlayRef.current = false; window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
                              window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
                              window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
                          }}
                       />

                       <div className="absolute -right-4 -bottom-4 w-8 h-8 bg-indigo-500 rounded-full cursor-nwse-resize shadow-lg flex items-center justify-center text-white border-2 border-white hover:scale-110 transition-transform"
                          onPointerDown={(e) => {
                              e.stopPropagation();
                              isDraggingOverlayRef.current = true; /* 🩹 화면 스크롤 방지 */
                              const canvasRect = canvasRefs.current[activeLayerId].getBoundingClientRect();
                              const startX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                              const startY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                              const initW = activeShape.w; const initH = activeShape.h;
                              const onMove = (moveEv) => {
                                  const scaleX = canvasRefs.current[activeLayerId].width / canvasRect.width;
                                  const scaleY = canvasRefs.current[activeLayerId].height / canvasRect.height;
                                  const clientX = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientX : moveEv.clientX;
                                  const clientY = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientY : moveEv.clientY;
                                  setActiveShape(prev => ({ ...prev, w: Math.max(40, initW + (clientX - startX) * scaleX), h: Math.max(40, initH + (clientY - startY) * scaleY) }));
                              };
                              const onUp = () => { isDraggingOverlayRef.current = false; window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
                              window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
                              window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
                          }}
                       ><Maximize2 size={14} /></div>

                       <div className="absolute -top-16 right-0 flex gap-2">
                           <button onClick={(e)=>{e.stopPropagation(); setActiveShape(null); setTool('pen');}} className="w-12 h-12 bg-rose-500 rounded-full text-white flex items-center justify-center shadow-lg hover:bg-rose-600 hover:-translate-y-1 transition-all border-2 border-white"><Trash2 size={20}/></button>
                           <button onClick={(e)=>{e.stopPropagation(); stampShape();}} className="px-6 h-12 bg-emerald-500 rounded-full font-black text-white flex items-center justify-center shadow-lg hover:bg-emerald-600 hover:-translate-y-1 transition-all border-4 border-white gap-1 whitespace-nowrap"><Check size={20} strokeWidth={3}/> 도형 꾹 찍기!</button>
                       </div>
                   </div>
                )}
             </div>
          </div>
        </div>
      )
    }

    const rootElement = document.getElementById('root');
    if (rootElement) {
      const root = createRoot(rootElement);
      root.render(<App />);
    }
  </script>
</body>
</html>
