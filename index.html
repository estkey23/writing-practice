    // ==========================================
    // PRACTICE SUBMISSIONS PANEL (교사용 연습장 확인)
    // ==========================================
    function PracticeSubmissionsPanel({ submissions, students, showAlert, showConfirm }) {
      const [selectedSub, setSelectedSub] = useState(null);
      const [viewPage, setViewPage] = useState(0);
      const [feedbackText, setFeedbackText] = useState('');
      const [studentFilter, setStudentFilter] = useState('all');
      const [zoomOpen, setZoomOpen] = useState(false);
      const [zoomLevel, setZoomLevel] = useState(1);

      const practiceSubs = submissions
        .filter(s => s.isPracticeSubmission === true)
        .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

      const filtered = studentFilter === 'all' ? practiceSubs : practiceSubs.filter(s => s.studentId === studentFilter);

      useEffect(() => {
        setFeedbackText(selectedSub?.teacherFeedback || '');
        setViewPage(0);
        setZoomOpen(false);
        setZoomLevel(1);
      }, [selectedSub?.id]);

      // 선택된 제출물이 삭제되면 selection 해제
      useEffect(() => {
        if (selectedSub && !practiceSubs.find(s => s.id === selectedSub.id)) setSelectedSub(null);
      }, [practiceSubs.length]);

      const saveFeedback = async (status) => {
        if (!selectedSub) return;
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', selectedSub.id), {
            teacherFeedback: feedbackText,
            practiceStatus: status,
            updatedAt: Date.now()
          });
          showAlert('저장 완료 ✏️', status === 'graded' ? '피드백이 저장되고 확인 완료로 표시되었어요.' : '피드백이 저장되었어요.');
        } catch (e) { console.error(e); showAlert('오류', '피드백 저장 중 문제가 발생했어요.'); }
      };

      const deletePracticeSub = (sub) => {
        showConfirm('연습장 제출물 삭제', `[${sub.savedNotepadTitle || '연습장'}]을 정말 삭제할까요? 학생 화면에서도 사라져요.`, async () => {
          try {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', sub.id));
            if (selectedSub?.id === sub.id) setSelectedSub(null);
            showAlert('삭제 완료', '삭제되었습니다.');
          } catch (e) { showAlert('오류', '삭제 중 문제가 발생했어요.'); }
        });
      };

      const pages = selectedSub ? (selectedSub.pagesData || [selectedSub.drawingData]).filter(Boolean) : [];
      const orientation = selectedSub?.orientation || 'portrait';

      return (
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
          {/* Left: 제출 목록 */}
          <div className="lg:col-span-1 space-y-3">
            <div className="bg-white rounded-3xl p-4 border-2 border-teal-100 shadow-sm">
              <label className="block text-[11px] font-black text-slate-500 mb-1">학생 필터</label>
              <select value={studentFilter} onChange={(e) => setStudentFilter(e.target.value)} className="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-sm font-bold focus:outline-none focus:border-teal-300">
                <option value="all">전체 학생</option>
                {students.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <h2 className="font-black text-xl text-slate-800 flex items-center gap-2"><Send className="text-teal-400" size={20}/> 제출한 연습장 ({filtered.length})</h2>
            {filtered.length === 0 ? (
              <p className="text-slate-400 font-bold p-6 text-center bg-white rounded-3xl border-2 border-dashed border-slate-200">아직 제출된 연습장이 없어요 📭</p>
            ) : (
              <div className="space-y-3 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                {filtered.map(sub => {
                  const isSelected = selectedSub?.id === sub.id;
                  const pgCount = (sub.pagesData || [sub.drawingData]).filter(Boolean).length;
                  return (
                    <div key={sub.id} onClick={() => setSelectedSub(sub)} className={`p-4 rounded-3xl border-2 cursor-pointer transition-all transform hover:-translate-y-0.5 ${isSelected ? 'border-teal-400 bg-teal-50 shadow-md' : 'border-slate-100 bg-white hover:border-teal-200'}`}>
                      <div className="flex justify-between items-start gap-2 mb-1">
                        <h3 className="font-black text-sm text-slate-800 leading-tight flex-1 truncate">{sub.savedNotepadTitle || '연습장'}</h3>
                        {sub.practiceStatus === 'graded' ? (
                          <span className="shrink-0 text-[10px] font-black text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded-full">확인 완료</span>
                        ) : (
                          <span className="shrink-0 text-[10px] font-black text-rose-600 bg-rose-100 px-2 py-0.5 rounded-full animate-pulse">확인 필요</span>
                        )}
                      </div>
                      <p className="text-[11px] font-bold text-slate-500 flex items-center gap-1"><BookOpen size={11}/> {sub.studentName} · {pgCount}쪽</p>
                      <p className="text-[10px] font-bold text-slate-400 mt-1">{sub.updatedAt ? new Date(sub.updatedAt).toLocaleString('ko-KR') : ''}</p>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Right: 상세 보기 + 피드백 */}
          <div className="lg:col-span-2">
            {selectedSub ? (
              <div className="bg-white rounded-[2.5rem] border-2 border-teal-100 shadow-sm p-5 space-y-4">
                <div className="flex items-center justify-between gap-2 border-b-2 border-slate-100 pb-3">
                  <div className="flex-1 min-w-0">
                    <h3 className="text-lg font-black text-slate-800 truncate">{selectedSub.savedNotepadTitle || '연습장'}</h3>
                    <p className="text-xs font-bold text-slate-500 mt-0.5">{selectedSub.studentName} · {pages.length}쪽 · {selectedSub.updatedAt ? new Date(selectedSub.updatedAt).toLocaleString('ko-KR') : ''}</p>
                  </div>
                  <button onClick={() => deletePracticeSub(selectedSub)} className="px-3 py-2 bg-white text-rose-500 border-2 border-rose-100 hover:bg-rose-50 font-black text-xs rounded-xl flex items-center gap-1"><Trash2 size={12}/> 삭제</button>
                </div>

                {/* 페이지 뷰어 */}
                {pages.length > 0 && (
                  <div className="space-y-2">
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-2">
                        <button onClick={() => setViewPage(p => Math.max(0, p - 1))} disabled={viewPage === 0} className="p-1.5 bg-slate-100 hover:bg-slate-200 disabled:opacity-30 rounded-lg"><ChevronLeft size={16}/></button>
                        <span className="text-xs font-black text-slate-600 bg-slate-100 px-3 py-1 rounded-full">{viewPage + 1} / {pages.length}</span>
                        <button onClick={() => setViewPage(p => Math.min(pages.length - 1, p + 1))} disabled={viewPage === pages.length - 1} className="p-1.5 bg-slate-100 hover:bg-slate-200 disabled:opacity-30 rounded-lg"><ChevronRight size={16}/></button>
                      </div>
                      <button onClick={() => { setZoomLevel(1); setZoomOpen(true); }} className="px-3 py-1.5 bg-indigo-500 hover:bg-indigo-600 text-white font-black text-xs rounded-xl flex items-center gap-1.5"><ZoomIn size={14}/> 확대해서 보기</button>
                    </div>
                    <div onClick={() => { setZoomLevel(1); setZoomOpen(true); }} className="relative w-full bg-white border-4 border-slate-100 rounded-2xl overflow-hidden cursor-zoom-in mx-auto" style={{ aspectRatio: orientation === 'landscape' ? '1.414 / 1' : '1 / 1.414', maxWidth: orientation === 'landscape' ? '100%' : '520px' }}>
                      <img src={pages[viewPage]} alt={`page ${viewPage + 1}`} className="absolute inset-0 w-full h-full" style={{ objectFit: 'fill' }}/>
                    </div>
                    {/* 페이지 썸네일 */}
                    {pages.length > 1 && (
                      <div className="grid grid-cols-4 sm:grid-cols-6 gap-2 pt-2">
                        {pages.map((p, i) => (
                          <div key={i} onClick={() => setViewPage(i)} className={`relative cursor-pointer border-4 rounded-xl overflow-hidden ${viewPage === i ? 'border-teal-400' : 'border-slate-200 opacity-70 hover:opacity-100'}`} style={{ aspectRatio: orientation === 'landscape' ? '1.414 / 1' : '1 / 1.414' }}>
                            <img src={p} alt={`thumb ${i+1}`} className="absolute inset-0 w-full h-full bg-white" style={{ objectFit: 'fill' }}/>
                            <span className="absolute top-1 left-1 bg-white/90 text-slate-700 text-[9px] font-black px-1.5 py-0.5 rounded-full">{i+1}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                {/* 피드백 영역 */}
                <div className="space-y-2 pt-3 border-t-2 border-slate-100">
                  <label className="text-xs font-black text-slate-600 flex items-center gap-1.5"><Pencil size={12}/> 학생에게 남길 피드백</label>
                  <textarea value={feedbackText} onChange={(e) => setFeedbackText(e.target.value)} rows={3} placeholder="예: 문제 풀이 정말 잘했어요! 다음에는 검산도 같이 해볼까요?" className="w-full border-2 border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold focus:outline-none focus:border-teal-300 resize-none"/>
                  <div className="flex gap-2 justify-end">
                    <button onClick={() => saveFeedback(selectedSub.practiceStatus || 'submitted')} className="px-4 py-2 bg-white text-teal-600 border-2 border-teal-100 hover:bg-teal-50 font-black text-xs rounded-xl">임시 저장</button>
                    <button onClick={() => saveFeedback('graded')} className="px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white font-black text-xs rounded-xl flex items-center gap-1.5"><Check size={14} strokeWidth={3}/> 확인 완료로 저장</button>
                  </div>
                </div>

                {/* 확대 보기 모달 */}
                {zoomOpen && pages[viewPage] && (
                  <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[200] flex flex-col items-center justify-center p-4" onClick={() => setZoomOpen(false)}>
                    <div className="w-full flex items-center justify-between mb-3 max-w-6xl px-2" onClick={(e) => e.stopPropagation()}>
                      <div className="text-white font-black text-sm bg-white/10 px-3 py-1.5 rounded-xl">{selectedSub.studentName} · {selectedSub.savedNotepadTitle} · {viewPage + 1}/{pages.length}</div>
                      <div className="flex items-center gap-2">
                        <button onClick={(e) => { e.stopPropagation(); setZoomLevel(z => Math.max(0.5, z - 0.25)); }} className="p-2 bg-white/90 hover:bg-white text-slate-600 rounded-xl"><ZoomOut size={18}/></button>
                        <span className="text-xs font-black text-white bg-white/10 px-3 py-2 rounded-xl">{Math.round(zoomLevel * 100)}%</span>
                        <button onClick={(e) => { e.stopPropagation(); setZoomLevel(z => Math.min(3, z + 0.25)); }} className="p-2 bg-white/90 hover:bg-white text-slate-600 rounded-xl"><ZoomIn size={18}/></button>
                        {pages.length > 1 && (
                          <>
                            <button onClick={(e) => { e.stopPropagation(); setViewPage(p => Math.max(0, p - 1)); }} disabled={viewPage === 0} className="p-2 bg-white/90 hover:bg-white text-slate-600 rounded-xl disabled:opacity-30"><ChevronLeft size={18}/></button>
                            <button onClick={(e) => { e.stopPropagation(); setViewPage(p => Math.min(pages.length - 1, p + 1)); }} disabled={viewPage === pages.length - 1} className="p-2 bg-white/90 hover:bg-white text-slate-600 rounded-xl disabled:opacity-30"><ChevronRight size={18}/></button>
                          </>
                        )}
                        <button onClick={(e) => { e.stopPropagation(); setZoomOpen(false); }} className="p-2 bg-rose-500 hover:bg-rose-600 text-white rounded-xl"><X size={18}/></button>
                      </div>
                    </div>
                    <div className="flex-1 w-full max-w-6xl overflow-auto bg-white/5 rounded-2xl p-4" onClick={(e) => e.stopPropagation()}>
                      <div className="relative bg-white shadow-2xl mx-auto" style={{ aspectRatio: orientation === 'landscape' ? '1.414 / 1' : '1 / 1.414', width: `${Math.round(80 * zoomLevel)}vh`, maxWidth: 'none' }}>
                        <img src={pages[viewPage]} alt="학생 필기" className="absolute inset-0 w-full h-full block" style={{ objectFit: 'fill' }}/>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <div className="h-full min-h-[400px] bg-white border-4 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center text-slate-400 font-bold gap-4">
                <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 mb-2"><Send size={32}/></div>
                좌측에서 제출된 연습장을 선택하면<br/>내용을 확인하고 피드백을 남길 수 있어요.
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // STUDENT DASHBOARD
    // ==========================================
    function StudentDashboard({ student, assignments, submissions, credentials, schoolInfo, showAlert, showConfirm }) {
      const [activeTab, setActiveTab] = useState('new');
      const [activeAssignment, setActiveAssignment] = useState(null);
      const [showPasswordChangeModal, setShowPasswordChangeModal] = useState(false); 

      const [currPassword, setCurrPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [newPasswordConfirm, setNewPasswordConfirm] = useState('');

      const newAssignments = [];
      const inProgressAssignments = [];
      const resubmitAssignments = [];
      const submittedAssignments = [];

      assignments.forEach(assign => {
        const sub = submissions.find(s => s.assignmentId === assign.id && s.studentId === student.id);
        if (!sub) newAssignments.push({ ...assign, subStatus: 'new' });
        else if (sub.status === 'in_progress') inProgressAssignments.push({ ...assign, submission: sub, subStatus: 'in_progress' });
        else if (sub.status === 'resubmit') resubmitAssignments.push({ ...assign, submission: sub, subStatus: 'resubmit' });
        else submittedAssignments.push({ ...assign, submission: sub, subStatus: sub.status });
      });

      useEffect(() => {
        const header = document.querySelector('.hidden-on-canvas');
        if (header) header.style.display = activeAssignment ? 'none' : 'flex';
        document.body.style.overflow = activeAssignment ? 'hidden' : 'auto';

        const resubmit = resubmitAssignments.find(a => a.submission.status === 'resubmit');
        if (resubmit && activeTab !== 'resubmit' && !activeAssignment) {
           showAlert('알림 💌', `선생님이 [${resubmit.title}] 과제를 확인하셨어요!\n수정해서 다시 제출해 볼까요? 💪`);
        }
      }, [submissions, activeAssignment]);

      const tabs = [
        { id: 'new', label: '새로운 과제 🎁', count: newAssignments.length, data: newAssignments },
        { id: 'inProgress', label: '풀고 있는 과제 ✏️', count: inProgressAssignments.length, data: inProgressAssignments },
        { id: 'resubmit', label: '다시 도전 🔄', count: resubmitAssignments.length, data: resubmitAssignments, alert: true },
        { id: 'submitted', label: '제출 완료 💯', count: submittedAssignments.length, data: submittedAssignments },
      ];

      const handleStudentPasswordChange = async (e) => {
        e.preventDefault();
        const savedPassword = credentials[student.id] || '0000';
        if (currPassword !== savedPassword) return showAlert('오류', '현재 사용중인 비밀번호가 일치하지 않습니다.');
        if (!newPassword) return showAlert('오류', '새롭게 설정할 비밀번호를 정확히 입력해주세요.');
        if (newPassword !== newPasswordConfirm) return showAlert('오류', '새 비밀번호 확인 입력이 일치하지 않습니다.');

        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'credentials', student.id), { password: newPassword });
          showAlert('변경 성공 🎉', '나만의 비밀번호가 안전하게 저장되었어요!');
          setShowPasswordChangeModal(false); setCurrPassword(''); setNewPassword(''); setNewPasswordConfirm('');
        } catch (err) { showAlert('오류', '실패했습니다.'); }
      };

      const openPracticeNotepad = (savedSub) => {
        // 💾 [기능9] savedSub 가 있으면 저장된 연습장을 이어서 열기
        const targetId = savedSub ? savedSub.assignmentId : `practice_${student.id}`;
        const targetTitle = savedSub && savedSub.savedNotepadTitle ? `📝 ${savedSub.savedNotepadTitle}` : '📝 무한 자유 연습장 (낙서장)';
        setActiveAssignment({
          id: targetId,
          title: targetTitle,
          instructions: '마음껏 S펜으로 연습하고 상상력을 펼쳐보세요! 하단의 [새 페이지]를 누르면 무한으로 쓸 수 있습니다. 🎨',
          orientation: 'portrait',
          isPractice: true,
          subStatus: 'in_progress',
          submission: savedSub || submissions.find(s => s.assignmentId === `practice_${student.id}`)
        });
      };

      // 💾 [기능9] 저장된 연습장 목록 (savedNotepadTitle 필드가 있는 것만) — 선생님께 제출한 연습장은 제외
      const savedNotepads = submissions.filter(s => 
        s.studentId === student.id && 
        typeof s.assignmentId === 'string' && 
        s.assignmentId.startsWith('practice_') && 
        s.assignmentId !== `practice_${student.id}` && 
        s.savedNotepadTitle && 
        !s.isPracticeSubmission
      ).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

      // 📤 [연습장 제출] 선생님께 제출한 연습장 목록 (피드백 확인용)
      const submittedPractices = submissions.filter(s => 
        s.studentId === student.id && s.isPracticeSubmission === true
      ).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

      const deleteSavedNotepad = (sub) => {
        showConfirm('연습장 삭제', `[${sub.savedNotepadTitle}] 을(를) 정말 삭제할까요?`, async () => {
          try { 
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', sub.id));
            showAlert('삭제 완료', '연습장이 삭제되었어요.');
          } catch (err) { showAlert('오류', '삭제 중 문제가 발생했어요.'); }
        });
      };

      if (activeAssignment) {
        return (
          <div className="fixed inset-0 bg-[#FFF9F0] z-50 flex flex-col">
            <DrawingCanvas assignment={activeAssignment} student={student} onClose={() => setActiveAssignment(null)} showAlert={showAlert} showConfirm={showConfirm} schoolInfo={schoolInfo} />
          </div>
        )
      }

      return (
        <div className="max-w-6xl mx-auto pb-10 relative">
          {showPasswordChangeModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[120] flex items-center justify-center p-4">
              <form onSubmit={handleStudentPasswordChange} className="bg-white rounded-[2rem] p-8 shadow-2xl max-w-sm w-full border-4 border-teal-100 animate-fade-in space-y-5">
                <div className="text-center mb-6">
                  <div className="w-16 h-16 bg-teal-100 text-teal-500 rounded-full flex items-center justify-center mx-auto mb-3"><Key size={32}/></div>
                  <h3 className="text-xl font-black text-slate-800">나만의 비밀번호 만들기</h3>
                  <p className="text-xs text-slate-400 mt-1 font-bold">친구들이 모르는 안전한 암호를 지어주세요!</p>
                </div>
                <div className="space-y-4">
                  <input type="password" value={currPassword} onChange={(e) => setCurrPassword(e.target.value)} placeholder="현재 비밀번호 (기본 0000)" className="w-full px-4 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black tracking-widest text-center text-slate-700 outline-none focus:border-teal-400 focus:bg-white transition-all"/>
                  <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} placeholder="새로 정할 암호 🤩" className="w-full px-4 py-3.5 bg-teal-50/50 border-2 border-teal-100 rounded-2xl font-black tracking-widest text-center text-teal-800 outline-none focus:border-teal-400 focus:bg-white transition-all"/>
                  <input type="password" value={newPasswordConfirm} onChange={(e) => setNewPasswordConfirm(e.target.value)} placeholder="새 암호 한번 더 확인!" className="w-full px-4 py-3.5 bg-teal-50/50 border-2 border-teal-100 rounded-2xl font-black tracking-widest text-center text-teal-800 outline-none focus:border-teal-400 focus:bg-white transition-all"/>
                </div>
                <div className="flex gap-2 pt-2">
                  <button type="button" onClick={() => setShowPasswordChangeModal(false)} className="w-1/3 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl font-black text-sm transition-all">취소</button>
                  <button type="submit" className="w-2/3 py-3.5 bg-teal-500 hover:bg-teal-600 text-white font-black rounded-2xl text-sm shadow-lg shadow-teal-200 transition-all hover:-translate-y-1">안전하게 바꾸기 🔒</button>
                </div>
              </form>
            </div>
          )}

          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 bg-white p-6 rounded-[2.5rem] shadow-xl shadow-indigo-50/50 border-4 border-white relative overflow-hidden">
            <div className="absolute -right-10 -top-10 w-40 h-40 bg-indigo-50 rounded-full blur-3xl"></div>
            <div className="text-slate-600 font-bold text-lg relative z-10 flex items-center gap-2">
               <div className="w-12 h-12 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center text-xl shadow-inner border border-white">🎒</div>
               <div>안녕, <span className="text-indigo-600 font-black text-xl">{student.name}</span> 친구!<br/><span className="text-sm font-medium text-slate-400">오늘도 신나게 공부를 시작해볼까요? 🚀</span></div>
            </div>
            <div className="flex flex-wrap gap-2.5 w-full sm:w-auto relative z-10">
              <button onClick={openPracticeNotepad} className="flex-1 sm:flex-initial flex items-center justify-center gap-2 px-6 py-3.5 bg-gradient-to-r from-amber-400 to-orange-400 hover:from-amber-500 hover:to-orange-500 text-white rounded-2xl font-black text-sm shadow-lg shadow-amber-200 transition-all hover:-translate-y-1">
                <BookOpen size={18} strokeWidth={2.5}/> 연습장 펴기
              </button>
              <button onClick={() => setShowPasswordChangeModal(true)} className="flex-1 sm:flex-initial flex items-center justify-center gap-2 px-4 py-3.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-2xl font-black text-sm transition-all">
                <Settings size={18} /> 암호
              </button>
            </div>
          </div>

          <div className="flex gap-2 overflow-x-auto pb-4 mb-6 border-b-4 border-indigo-50 custom-scrollbar">
            {tabs.map(tab => (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`whitespace-nowrap px-4 md:px-6 py-4 rounded-t-[1.5rem] font-black text-sm md:text-[15px] transition-all relative ${activeTab === tab.id ? 'bg-indigo-500 text-white shadow-lg translate-y-1' : 'bg-white text-slate-400 hover:bg-slate-50 border-2 border-transparent hover:border-slate-100'}`}
              >
                {tab.label}
                {tab.count > 0 && (
                  <span className={`absolute -top-1 -right-1 transform text-[10px] font-black text-white px-2 py-0.5 rounded-full border-2 border-white shadow-sm ${tab.alert ? 'bg-rose-500 animate-pulse' : 'bg-blue-500'}`}>
                    {tab.count}
                  </span>
                )}
              </button>
            ))}
          </div>

          {/* 💾 [기능9] 저장된 연습장 목록 */}
          {savedNotepads.length > 0 && (
            <div className="mb-6 bg-white rounded-[2rem] p-5 border-4 border-amber-100 shadow-sm">
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-sm font-black text-amber-700 flex items-center gap-2">
                  <BookOpen size={16}/> 저장한 연습장 다시 열기 ({savedNotepads.length})
                </h3>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {savedNotepads.slice(0, 12).map(sub => (
                  <div key={sub.id} className="bg-amber-50/50 border-2 border-amber-100 rounded-2xl p-3 flex flex-col gap-2 hover:border-amber-300 transition">
                    <div className="text-xs font-black text-amber-900 truncate">{sub.savedNotepadTitle}</div>
                    <div className="text-[10px] text-amber-600 font-bold">{sub.updatedAt ? new Date(sub.updatedAt).toLocaleString('ko-KR') : ''} • {(sub.pagesData || [sub.drawingData]).length}쪽</div>
                    <div className="flex gap-1.5 mt-1">
                      <button onClick={() => openPracticeNotepad(sub)} className="flex-1 py-2 bg-amber-500 hover:bg-amber-600 text-white text-[11px] font-black rounded-xl transition">불러오기</button>
                      <button onClick={() => deleteSavedNotepad(sub)} className="px-2 py-2 bg-white text-rose-500 border border-rose-100 text-[11px] font-black rounded-xl hover:bg-rose-50 transition"><Trash2 size={12}/></button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 📤 [연습장 제출] 선생님께 제출한 연습장 목록 (피드백 표시) */}
          {submittedPractices.length > 0 && (
            <div className="mb-6 bg-white rounded-[2rem] p-5 border-4 border-teal-100 shadow-sm">
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-sm font-black text-teal-700 flex items-center gap-2">
                  <Send size={16}/> 선생님께 제출한 연습장 ({submittedPractices.length})
                </h3>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {submittedPractices.slice(0, 12).map(sub => (
                  <div key={sub.id} className="bg-teal-50/50 border-2 border-teal-100 rounded-2xl p-3 flex flex-col gap-2">
                    <div className="flex items-center justify-between gap-2">
                      <div className="text-xs font-black text-teal-900 truncate flex-1">{sub.savedNotepadTitle || '연습장 제출'}</div>
                      {sub.practiceStatus === 'graded' ? (
                        <span className="text-[9px] font-black text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded-full whitespace-nowrap">확인 완료</span>
                      ) : (
                        <span className="text-[9px] font-black text-amber-700 bg-amber-100 px-2 py-0.5 rounded-full whitespace-nowrap">확인 대기</span>
                      )}
                    </div>
                    <div className="text-[10px] text-teal-600 font-bold">{sub.updatedAt ? new Date(sub.updatedAt).toLocaleString('ko-KR') : ''} • {(sub.pagesData || [sub.drawingData]).filter(Boolean).length}쪽</div>
                    {sub.teacherFeedback && (
                      <div className="text-[11px] font-bold text-teal-800 bg-white border border-teal-100 rounded-xl p-2 whitespace-pre-wrap">

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            {tabs.find(t => t.id === activeTab).data.length === 0 ? (

                 <p className="text-slate-400 font-black text-lg">해당 탭에는 과제가 없어요!<br/>자유롭게 연습장을 펴고 놀아볼까요? 🎉</p>
              </div>
            ) : (
              tabs.find(t => t.id === activeTab).data.map(assign => (
                <div key={assign.id} className="bg-white rounded-[2rem] p-6 shadow-xl shadow-indigo-50/50 border-2 border-slate-100 hover:border-indigo-300 transition-all hover:-translate-y-2 flex flex-col justify-between group">
                  <div>
                    <div className="flex justify-between items-start mb-4">
                      <span className={`text-[11px] font-black px-3 py-1.5 rounded-xl shadow-sm border ${activeTab==='resubmit' ? 'bg-rose-50 border-rose-200 text-rose-600' : activeTab==='submitted' ? 'bg-emerald-50 border-emerald-200 text-emerald-600' : 'bg-indigo-50 border-indigo-200 text-indigo-600'}`}>
                        {activeTab === 'new' ? '✨ NEW' : activeTab === 'inProgress' ? '✏️ 푸는 중' : activeTab === 'resubmit' ? '🔥 다시 도전' : '💯 평가 대기중'}
                      </span>
                      {assign.deadline && <span className="text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-lg border border-slate-100 flex items-center gap-1"><Clock size={10}/> {assign.deadline}</span>}
                    </div>
                    <h3 className="text-lg font-black text-slate-800 mb-3 leading-snug group-hover:text-indigo-600 transition-colors">
                      {assign.status === 'closed' && <span className="text-rose-500 mr-1">[종료]</span>}
                      {assign.title}
                    </h3>
                    {assign.submission?.feedback && (
                      <div className="mt-3 p-4 bg-gradient-to-r from-amber-50 to-orange-50 rounded-2xl text-xs text-amber-900 border-2 border-amber-100 shadow-inner">
                        <span className="font-black block mb-1 flex items-center gap-1"><Lightbulb size={12}/> 선생님의 편지</span>{assign.submission.feedback}
                      </div>
                    )}
                  </div>
                  <button 
                    onClick={() => {
                      setActiveAssignment(assign);
                      if (assign.subStatus === 'new' && assign.instructions) showAlert('선생님의 다정한 안내 💌', assign.instructions);
                    }}
                    className={`mt-6 w-full py-4 rounded-2xl font-black text-white shadow-lg transition-all flex items-center justify-center gap-2 group-hover:scale-[1.02] ${activeTab === 'submitted' ? 'bg-slate-300 hover:bg-slate-400 shadow-slate-200' : activeTab === 'resubmit' ? 'bg-gradient-to-r from-rose-400 to-orange-400 hover:from-rose-500 hover:to-orange-500 shadow-rose-200' : 'bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 shadow-indigo-200'}`}
                  >
                    {activeTab === 'submitted' ? '내가 낸 과제 보기 👀' : <><Pencil size={18} strokeWidth={3}/> 학습지 펴기 ✨</>}
                  </button>
                </div>
              ))
            )}
          </div>
        </div>
      )
    }

    // ==========================================
    // FULLSCREEN DRAWING CANVAS
    // ==========================================
    function DrawingCanvas({ assignment, student, onClose, showAlert, showConfirm, schoolInfo }) {
      const canvasRefs = useRef({});
      const previewCanvasRef = useRef(null);
      const containerRef = useRef(null);
      const canvasContainerRef = useRef(null);
      // 🔍 [기능3] 캔버스 확대 시 눈에 보이는 스크롤 & 스크롤 버튼용 ref
      const scrollAreaRef = useRef(null);
      const lastPosRef = useRef({ x: 0, y: 0 }); 
      
      const bgImages = assignment.baseImages || (assignment.baseImage ? [assignment.baseImage] : []);

      const [pages, setPages] = useState(() => {
        if (assignment.submission?.pagesData && assignment.submission.pagesData.length > 0) return assignment.submission.pagesData;
        if (assignment.submission?.drawingData) return [assignment.submission.drawingData];
        if (bgImages.length > 0) return Array(bgImages.length).fill('');
        return ['']; 
      });
      const [currentPageIndex, setCurrentPageIndex] = useState(0);

      const [layers, setLayers] = useState([{ id: 'base', name: '📄 기본 종이', visible: true, zIndex: 1 }, { id: 'layer_1', name: '🎨 필기 1', visible: true, zIndex: 2 }]);
      const [activeLayerId, setActiveLayerId] = useState('layer_1');
      const [canvasSize, setCanvasSize] = useState({ w: 800, h: 1131 }); 
      
      const [isDrawing, setIsDrawing] = useState(false);
      const [drawStartCoords, setDrawStartCoords] = useState({ x: 0, y: 0 });
      const [tool, setTool] = useState('pen'); 
      const [penType, setPenType] = useState('signpen'); 
      const [color, setColor] = useState('#1e1e1e');
      const [lineWidth, setLineWidth] = useState(4);
      const [opacity, setOpacity] = useState(1.0); 
      const [fillShape, setFillShape] = useState(false); 

      const [activeText, setActiveText] = useState(null); 
      const [fontFamily, setFontFamily] = useState("'Jua', sans-serif"); 
      const [textStyle, setTextStyle] = useState({ bold: false, italic: false, underline: false, strike: false });
      const [activeSelection, setActiveSelection] = useState(null); 

      const [inputMode, setInputMode] = useState('all'); 
      const [zoomScale, setZoomScale] = useState(1.0);
      const [isToolbarOpen, setIsToolbarOpen] = useState(true);
      const [showSizePreview, setShowSizePreview] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isRefOpen, setIsRefOpen] = useState(false);
      const [isAttachModalOpen, setIsAttachModalOpen] = useState(false);

      const [studentRefImageUrl, setStudentRefImageUrl] = useState(assignment.submission?.studentRefImageUrl || '');
      const [studentRefVideoUrl, setStudentRefVideoUrl] = useState(assignment.submission?.studentRefVideoUrl || '');
      const [studentRefLinkUrl, setStudentRefLinkUrl] = useState(assignment.submission?.studentRefLinkUrl || '');
      const [studentFileType, setStudentFileType] = useState(assignment.submission?.studentFileType || 'none');
      const [studentFileName, setStudentFileName] = useState(assignment.submission?.studentFileName || '');

      const [currentSubmissionId, setCurrentSubmissionId] = useState(assignment.submission?.id || null);
      const [undoStack, setUndoStack] = useState({});
      // 🔁 [기능2] 되돌린 작업을 다시 복구할 수 있는 redo 스택
      const [redoStack, setRedoStack] = useState({});
      // ⏱️ [기능12] 롱프레스(2초 꾹) 감지 refs — 캔버스에 그려진 것을 잘라서 이동
      const longPressTimerRef = useRef(null);
      const longPressPosRef = useRef({ x: 0, y: 0 });
      // 🖼️ [기능7] 연습장 배경 이미지 (사진 첨부 시 배경으로 사용)
      const [practiceBgImages, setPracticeBgImages] = useState(assignment.submission?.practiceBgImages || []);
      // 📤 [연습장 제출] 학생이 원하는 페이지만 골라 선생님께 제출하는 기능
      const [showPracticeSubmitModal, setShowPracticeSubmitModal] = useState(false);
      const [selectedPagesForSubmit, setSelectedPagesForSubmit] = useState([]);
      const [practiceSubmitTitle, setPracticeSubmitTitle] = useState('');
      const [isPracticeSubmitting, setIsPracticeSubmitting] = useState(false);
      // 📤 [기능-부분제출] 일반 과제에서 부분 제출을 허용한 경우, 학생이 원하는 페이지만 골라 제출
      const [showPartialSubmitModal, setShowPartialSubmitModal] = useState(false);
      const [partialSelectedPages, setPartialSelectedPages] = useState([]);
      const [isPartialSubmitting, setIsPartialSubmitting] = useState(false);
      const practiceBgImagesRef = useRef(practiceBgImages);
      // 🩹 [기능5,12] 오버레이(텍스트/도형/선택영역)를 드래그·리사이즈 하는 중에는 화면 스크롤 방지
      const isDraggingOverlayRef = useRef(false);
      useEffect(() => { practiceBgImagesRef.current = practiceBgImages; }, [practiceBgImages]);

      const layersRef = useRef(layers);
      const currentSubmissionIdRef = useRef(currentSubmissionId);
      const studentRefImageUrlRef = useRef(studentRefImageUrl);
      const studentRefVideoUrlRef = useRef(studentRefVideoUrl);
      const studentRefLinkUrlRef = useRef(studentRefLinkUrl);
      const studentFileTypeRef = useRef(studentFileType);
      const studentFileNameRef = useRef(studentFileName);

      useEffect(() => { layersRef.current = layers; }, [layers]);
      useEffect(() => { currentSubmissionIdRef.current = currentSubmissionId; }, [currentSubmissionId]);
      useEffect(() => { studentRefImageUrlRef.current = studentRefImageUrl; }, [studentRefImageUrl]);
      useEffect(() => { studentRefVideoUrlRef.current = studentRefVideoUrl; }, [studentRefVideoUrl]);
      useEffect(() => { studentRefLinkUrlRef.current = studentRefLinkUrl; }, [studentRefLinkUrl]);
      useEffect(() => { studentFileTypeRef.current = studentFileType; }, [studentFileType]);
      useEffect(() => { studentFileNameRef.current = studentFileName; }, [studentFileName]);

      // 🩹 [기능11] 두께/투명도 미리보기가 화면에 계속 남는 오류 방지
      //  - 슬라이더 조작이 끝나도 pointerup/touchend가 슬라이더 밖에서 발생하면
      //    onPointerUp이 호출되지 않을 수 있음 → 창(window) 레벨에서도 감지해 자동 해제
      useEffect(() => {
        if (!showSizePreview) return;
        const clear = () => setShowSizePreview(false);
        window.addEventListener('pointerup', clear);
        window.addEventListener('pointercancel', clear);
        window.addEventListener('touchend', clear);
        window.addEventListener('touchcancel', clear);
        window.addEventListener('mouseup', clear);
        // 최대 3초 후에는 안전하게 자동 해제
        const t = setTimeout(clear, 3000);
        return () => {
          window.removeEventListener('pointerup', clear);
          window.removeEventListener('pointercancel', clear);
          window.removeEventListener('touchend', clear);
          window.removeEventListener('touchcancel', clear);
          window.removeEventListener('mouseup', clear);
          clearTimeout(t);
        };
      }, [showSizePreview]);

      const [activeShape, setActiveShape] = useState(null); 
      // 🩹 [기능14] 이미 제출한 과제를 이어서 수정할 수 있게 하는 오버라이드
      const [resubmitOverride, setResubmitOverride] = useState(false);
      const isReadOnly = (assignment.status === 'closed' || assignment.subStatus === 'submitted' || assignment.subStatus === 'graded') && !resubmitOverride;

      const HIGHLIGHTER_COLORS = [
        { name: '노랑', value: '#FDE047' }, 
        { name: '주황', value: '#FDBA74' },
        { name: '분홍', value: '#F9A8D4' },
        { name: '하늘', value: '#7DD3FC' }
      ];

      useEffect(() => {
        if (penType === 'highlighter') {
          const isHighlighterColor = HIGHLIGHTER_COLORS.some(hc => hc.value.toLowerCase() === color.toLowerCase());
          if (!isHighlighterColor) setColor('#FDE047');
        }
      }, [penType]);

      const handlePenTypeChange = (newType) => { setPenType(newType); if (newType === 'highlighter') setColor('#FFFF00'); };

      const addLayer = () => {
        const nextNum = layers.length;
        const newId = `layer_${Date.now()}`;
        const newLayer = { id: newId, name: `🎨 필기 ${nextNum}`, visible: true, zIndex: nextNum + 1 };
        setLayers([...layers, newLayer]);
        setActiveLayerId(newId);
      };

      const deleteLayer = (idToDelete) => {
        if (idToDelete === 'base' || idToDelete === 'layer_1') return showAlert('안내', '기본 도화지는 버릴 수 없어요! 😅');
        showConfirm('레이어 버리기', '이 층에 그려진 그림들이 모두 사라집니다. 정말 버릴까요? 🗑️', () => {
          delete canvasRefs.current[idToDelete];
          setLayers(prevLayers => {
            const filtered = prevLayers.filter(l => l.id !== idToDelete);
            setTimeout(() => saveProgressWithLayers(filtered, 'in_progress'), 50);
            return filtered;
          });
          if (activeLayerId === idToDelete) setActiveLayerId('layer_1');
        });
      };

      const toggleLayerVisibility = (id) => setLayers(layers.map(l => l.id === id ? { ...l, visible: !l.visible } : l));

      // 📚 [기능6] 레이어 순서 변경 (위/아래 화살표)
      //  - base 는 항상 최하단(zIndex 1)으로 고정
      //  - 순서만 z-index를 다시 부여해 겹침 순서를 명확히 제어
      const reorderLayer = (id, direction) => {
        if (id === 'base') return;
        setLayers(prevLayers => {
          const filtered = prevLayers.filter(l => l.id !== 'base');
          const idx = filtered.findIndex(l => l.id === id);
          if (idx < 0) return prevLayers;
          const newIdx = direction === 'up' ? idx + 1 : idx - 1;
          if (newIdx < 0 || newIdx >= filtered.length) return prevLayers;
          const arr = [...filtered];
          const [moved] = arr.splice(idx, 1);
          arr.splice(newIdx, 0, moved);
          // z-index 재부여: 배열 순서대로 2부터 증가
          const relabeled = arr.map((l, i) => ({ ...l, zIndex: i + 2 }));
          const base = prevLayers.find(l => l.id === 'base');
          return [base, ...relabeled];
        });
      };

      // 🔥 초절약 압축 저장 로직: 투명 배경을 하얀색으로 렌더링하고 압축률이 뛰어난 JPEG로 덮어씌움
      const captureCurrentPageToDataURL = () => {
        const compositeCanvas = document.createElement('canvas');
        compositeCanvas.width = canvasSize.w; compositeCanvas.height = canvasSize.h;
        const compCtx = compositeCanvas.getContext('2d');
        
        // 🎨 도구로 그린 필기 레이어만 '투명 PNG'로 저장 (배경 학습지는 검사·조회 시 별도 오버레이 처리)
        layersRef.current.forEach(layer => {
          if (layer.id === 'base') return; 
          if (layer.visible && canvasRefs.current[layer.id]) compCtx.drawImage(canvasRefs.current[layer.id], 0, 0);
        });
        
        return compositeCanvas.toDataURL('image/png');
      };

      const changePage = (newIndex) => {
        if (newIndex < 0 || newIndex >= pages.length) return;
        const currentDataUrl = captureCurrentPageToDataURL();
        setPages(prev => { const updated = [...prev]; updated[currentPageIndex] = currentDataUrl; return updated; });
        setCurrentPageIndex(newIndex);
      };

      const addNewPage = () => {
        const currentDataUrl = captureCurrentPageToDataURL();
        setPages(prev => { const updated = [...prev]; updated[currentPageIndex] = currentDataUrl; updated.push(''); return updated; });
        setCurrentPageIndex(pages.length);
      };

      // 🗑️ [기능 추가] 필요없는 페이지 삭제 — 마지막 한 쪽은 남겨두고 삭제 가능
      const deleteCurrentPage = () => {
        if (isReadOnly) { showAlert('안내', '제출 완료 상태에서는 삭제할 수 없어요.'); return; }
        if (pages.length <= 1) { showAlert('삭제 불가', '마지막 남은 한 쪽은 삭제할 수 없어요. 새 도화지를 먼저 추가하세요.'); return; }
        showConfirm('페이지 삭제', `[Page ${currentPageIndex + 1}]을(를) 정말 삭제할까요?\n이 페이지에 그린 내용은 모두 사라져요.`, () => {
          // 현재 캔버스 내용을 먼저 비워 다음 렌더 때 이전 잔상이 남지 않도록 함
          layersRef.current.forEach(layer => {
            if (layer.id === 'base') return;
            const cv = canvasRefs.current[layer.id];
            if (cv) cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
          });
          const removeIdx = currentPageIndex;
          const newPages = pages.filter((_, i) => i !== removeIdx);
          const newIndex = Math.min(removeIdx, newPages.length - 1);
          setPages(newPages);
          setCurrentPageIndex(newIndex);
        });
      };

      // 📤 [연습장 제출] 제출 모달 열기 — 현재 페이지 데이터를 먼저 반영해서 모달 썸네일이 최신 상태를 보여주도록 함
      const openPracticeSubmitModal = () => {
        if (isReadOnly) { showAlert('안내', '이미 제출된 상태에서는 다시 제출할 수 없어요.'); return; }
        const currentDataUrl = captureCurrentPageToDataURL();
        const updated = [...pages];
        updated[currentPageIndex] = currentDataUrl;
        setPages(updated);
        // 기본값: 모든 페이지 선택
        setSelectedPagesForSubmit(updated.map((_, i) => i));
        // 기본 제목: 저장된 연습장 이름 또는 오늘 날짜
        const defaultTitle = (assignment.submission && assignment.submission.savedNotepadTitle) 
          ? assignment.submission.savedNotepadTitle 
          : `연습장 ${new Date().toLocaleDateString('ko-KR')}`;
        setPracticeSubmitTitle(defaultTitle);
        setShowPracticeSubmitModal(true);
      };

      const togglePageForSubmit = (idx) => {
        setSelectedPagesForSubmit(prev => prev.includes(idx) ? prev.filter(x => x !== idx) : [...prev, idx].sort((a,b) => a - b));
      };

      const submitPracticePages = async () => {
        if (selectedPagesForSubmit.length === 0) { showAlert('안내', '제출할 페이지를 하나 이상 선택하세요.'); return; }
        setIsPracticeSubmitting(true);
        const safetyTimer = setTimeout(() => setIsPracticeSubmitting(false), 15000);
        try {
          // 선택된 페이지의 dataURL을 준비 — 큰 이미지는 JPEG로 압축해 문서 크기를 줄임
          const sortedIdx = [...selectedPagesForSubmit].sort((a,b) => a - b);
          const rawPages = sortedIdx.map(i => pages[i]).filter(Boolean);
          const compressedPages = await Promise.all(rawPages.map(dataUrl => new Promise((resolve) => {
            if (!dataUrl) { resolve(''); return; }
            if (dataUrl.length < 500000) { resolve(dataUrl); return; }
            const img = new Image();
            img.onload = () => {
              const cvs = document.createElement('canvas');
              cvs.width = canvasSize.w; cvs.height = canvasSize.h;
              const ctx = cvs.getContext('2d');
              ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, cvs.width, cvs.height);
              ctx.drawImage(img, 0, 0, cvs.width, cvs.height);
              resolve(cvs.toDataURL('image/jpeg', 0.8));
            };
            img.onerror = () => resolve(dataUrl);
            img.src = dataUrl;
          })));

          const titleTrim = (practiceSubmitTitle || '연습장 제출').trim() || '연습장 제출';
          const subData = {
            assignmentId: `practice_submit_${student.id}_${Date.now()}`,
            studentId: student.id,
            studentName: student.name,
            status: 'submitted',
            isPracticeSubmission: true,
            practiceStatus: 'submitted',
            savedNotepadTitle: titleTrim,
            drawingData: compressedPages[0] || '',
            pagesData: compressedPages,
            orientation: assignment.orientation || 'portrait',
            updatedAt: Date.now(),
            createdAt: Date.now()
          };
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'), subData);
          showAlert('제출 성공 🎉', `선생님께 연습장 [${titleTrim}] 을 제출했어요!`);
          setShowPracticeSubmitModal(false);
        } catch (e) {
          console.error(e);
          showAlert('오류', '연습장 제출 중 문제가 생겼어요. 페이지 수를 줄이거나 잠시 후 다시 시도해주세요.');
        } finally {
          clearTimeout(safetyTimer);
          setIsPracticeSubmitting(false);
        }
      };

      // 📤 [기능-부분제출] 일반 과제의 부분 제출 모달 열기 — 기본값: 모든 페이지 선택
      const openPartialSubmitModal = () => {
        if (isReadOnly) { showAlert('안내', '이미 제출된 상태에서는 다시 제출할 수 없어요.'); return; }
        const currentDataUrl = captureCurrentPageToDataURL();
        const updated = [...pages];
        updated[currentPageIndex] = currentDataUrl;
        setPages(updated);
        setPartialSelectedPages(updated.map((_, i) => i));
        setShowPartialSubmitModal(true);
      };

      const togglePagePartial = (idx) => {
        setPartialSelectedPages(prev => prev.includes(idx) ? prev.filter(x => x !== idx) : [...prev, idx].sort((a,b) => a - b));
      };

      // 📤 [기능-부분제출] 실제 부분 제출 — 선택된 페이지만 필기로 저장하고 status를 submitted로 변경
      // - 선택되지 않은 페이지는 빈 문자열로 대체(선생님이 확인할 때 배경만 노출)
      const submitPartialPages = async () => {
        if (partialSelectedPages.length === 0) { showAlert('안내', '제출할 페이지를 하나 이상 선택하세요.'); return; }
        if (isReadOnly) return;
        setIsPartialSubmitting(true);
        const safetyTimer = setTimeout(() => setIsPartialSubmitting(false), 15000);
        try {
          // 현재 화면 필기를 반영
          const currentDataUrl = captureCurrentPageToDataURL();
          const workingPages = [...pages];
          workingPages[currentPageIndex] = currentDataUrl;

          // 선택된 페이지만 남기고 나머지는 빈 문자열로 (배경만 보이도록)

          // 압축 처리 (700KB 이상이면 JPEG로)
          const compressedPages = await Promise.all(submittedPages.map(dataUrl => new Promise((resolve) => {
            if (!dataUrl) { resolve(''); return; }

              resolve(cvs.toDataURL('image/jpeg', 0.8));

          const subData = {

            pagesData: compressedPages,

            // 📤 부분 제출 마킹 — 어떤 페이지가 제출되었는지 인덱스로 기록
            isPartialSubmit: true,

          };

          else {

            setCurrentSubmissionId(docRef.id);

      useEffect(() => {
        const updateSize = () => {
            const container = containerRef.current;
            if (!container) return;
            let w = container.clientWidth;
            if (w === 0) w = window.innerWidth * 0.8; 
            
            let h = w / (assignment.orientation === 'landscape' ? 1.414 : 0.707);
            if (h > container.clientHeight && container.clientHeight > 0) { 
                h = container.clientHeight; 
                w = h * (assignment.orientation === 'landscape' ? 1.414 : 0.707); 
            }
            
            w = Math.floor(w); h = Math.floor(h);
            if (w > 0 && h > 0) setCanvasSize({ w, h });
            if (window.innerWidth < 768) setIsToolbarOpen(false);
        };

        updateSize();
        // 🩹 [태블릿 버튼 터치 버그 수정] 컨테이너 전체에 preventDefault를 걸면 태블릿(S9 FE 등)에서
        // touchstart가 억제되어 후속 click 이벤트가 생성되지 않아 도구상자·제출·첨부 버튼이
        // 모두 반응하지 않는 문제가 있었음. 실제 <canvas> 요소를 터치했을 때만 기본 동작을
        // 막도록 target을 판별해 버튼/입력 요소의 탭은 정상 동작하도록 함.
        const preventScroll = (e) => {
          // 🩹 [기능5] 오버레이(텍스트/도형/선택영역)를 드래그·리사이즈 중이면 화면 스크롤/줌 방지
          if (isDraggingOverlayRef.current) { e.preventDefault(); return; }

          }

        if (container) {
            container.addEventListener('touchstart', preventScroll, { passive: false });

              container.removeEventListener('touchmove', preventScroll);

      }, [assignment.orientation]); 

      useEffect(() => {
        if (canvasSize.w === 800 || canvasSize.w === 0) return;

        const baseCanvas = canvasRefs.current['base'];
